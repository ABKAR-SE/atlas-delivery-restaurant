<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas Delivery — Restaurant Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07070E;--surface:#0F0F1A;--surface2:#161625;--surface3:#1C1C2E;
  --border:rgba(0,212,255,0.10);--border2:rgba(255,255,255,0.06);
  --cyan:#00D4FF;--violet:#7B2FFF;--orange:#FF6B35;--green:#00FF88;
  --red:#FF3B3B;--yellow:#FFB800;
  --text:#E8E8F0;--muted:#5A5A78;
  --font-d:'Syne',sans-serif;--font-b:'DM Sans',sans-serif;--font-m:'JetBrains Mono',monospace
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);display:flex;min-height:100vh;overflow-x:hidden}

/* ── SIDEBAR ── */
.sidebar{
  width:220px;flex-shrink:0;
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  position:fixed;top:0;bottom:0;left:0;z-index:50
}
.sidebar-logo{
  padding:24px 20px 20px;
  border-bottom:1px solid var(--border);
  display:flex;flex-direction:column;gap:4px
}
.sidebar-logo-top{
  font-family:var(--font-m);font-size:10px;
  color:var(--muted);letter-spacing:0.12em;text-transform:uppercase
}
.sidebar-logo-main{
  font-family:var(--font-d);font-size:15px;font-weight:700;color:var(--cyan)
}
.sidebar-rest{
  padding:16px 20px;
  border-bottom:1px solid var(--border);
}
.rest-indicator{
  display:flex;align-items:center;gap:10px
}
.rest-dot{
  width:10px;height:10px;border-radius:50%;
  background:var(--green);box-shadow:0 0 8px var(--green);
  flex-shrink:0
}
.rest-name{font-size:13px;font-weight:600}
.rest-status{font-family:var(--font-m);font-size:10px;color:var(--green);letter-spacing:0.08em}
.sidebar-nav{flex:1;padding:12px 0;overflow-y:auto}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 20px;cursor:pointer;
  font-size:13px;color:var(--muted);
  transition:all 0.15s;border:none;background:none;width:100%;text-align:left
}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,0.03)}
.nav-item.active{color:var(--cyan);background:rgba(0,212,255,0.06)}
.nav-item.active::before{
  content:'';position:absolute;left:0;
  width:3px;height:36px;background:var(--cyan);border-radius:0 3px 3px 0
}
.nav-item{position:relative}
.nav-icon{font-size:16px;width:20px;text-align:center}
.nav-badge{
  margin-left:auto;
  background:var(--orange);color:#07070E;
  font-family:var(--font-m);font-size:10px;font-weight:700;
  padding:2px 7px;border-radius:100px;min-width:20px;text-align:center
}
.sidebar-bottom{
  padding:16px 20px;border-top:1px solid var(--border)
}
.toggle-row{
  display:flex;align-items:center;justify-content:space-between;
  font-size:12px;color:var(--muted)
}
.toggle{
  width:40px;height:22px;background:var(--green);
  border-radius:100px;position:relative;cursor:pointer;
  transition:background 0.2s;flex-shrink:0
}
.toggle.off{background:var(--surface3)}
.toggle::after{
  content:'';position:absolute;
  top:3px;left:3px;width:16px;height:16px;
  background:white;border-radius:50%;
  transition:transform 0.2s
}
.toggle.off::after{transform:none}
.toggle:not(.off)::after{transform:translateX(18px)}

/* ── MAIN ── */
.main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{
  padding:0 28px;height:60px;
  background:rgba(7,7,14,0.9);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:40
}
.topbar-title{font-family:var(--font-d);font-size:18px;font-weight:700}
.topbar-right{display:flex;align-items:center;gap:12px}
.topbar-time{font-family:var(--font-m);font-size:12px;color:var(--muted)}
.alarm-btn{
  display:flex;align-items:center;gap:8px;
  background:rgba(255,107,53,0.12);border:1px solid rgba(255,107,53,0.3);
  color:var(--orange);font-family:var(--font-m);font-size:11px;
  padding:6px 14px;border-radius:8px;cursor:pointer;border-style:solid;
  letter-spacing:0.06em;transition:all 0.2s
}
.alarm-btn:hover{background:rgba(255,107,53,0.2)}

/* ── CONTENT ── */
.content{padding:28px;flex:1}

/* ── STATS ROW ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.stat-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:20px;position:relative;overflow:hidden
}
.stat-card::before{
  content:'';position:absolute;
  top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--c1,#00D4FF),var(--c2,#7B2FFF))
}
.stat-label{font-family:var(--font-m);font-size:10px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px}
.stat-val{font-family:var(--font-d);font-size:28px;font-weight:800}
.stat-change{
  display:flex;align-items:center;gap:4px;
  font-family:var(--font-m);font-size:11px;margin-top:6px
}
.up{color:var(--green)}
.down{color:var(--red)}

/* ── ORDERS SECTION ── */
.section-row{display:grid;grid-template-columns:1fr 320px;gap:20px}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.panel-header{
  padding:16px 20px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between
}
.panel-title{font-family:var(--font-d);font-size:15px;font-weight:700}
.panel-action{
  font-family:var(--font-m);font-size:11px;color:var(--cyan);
  cursor:pointer;letter-spacing:0.06em;border:none;background:none
}

/* ── ORDER LIST ── */
.order-item{
  padding:16px 20px;border-bottom:1px solid var(--border2);
  cursor:pointer;transition:background 0.15s
}
.order-item:hover{background:rgba(255,255,255,0.02)}
.order-item.selected{background:rgba(0,212,255,0.04);border-left:2px solid var(--cyan)}
.order-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.order-id{font-family:var(--font-m);font-size:12px;color:var(--cyan);letter-spacing:0.06em}
.order-status{
  font-family:var(--font-m);font-size:10px;letter-spacing:0.08em;
  padding:3px 10px;border-radius:100px;font-weight:600
}
.status-new{background:rgba(0,212,255,0.15);color:var(--cyan);border:1px solid rgba(0,212,255,0.3)}
.status-preparing{background:rgba(255,184,0,0.15);color:var(--yellow);border:1px solid rgba(255,184,0,0.3)}
.status-ready{background:rgba(0,255,136,0.15);color:var(--green);border:1px solid rgba(0,255,136,0.3)}
.status-picked{background:rgba(123,47,255,0.15);color:#B080FF;border:1px solid rgba(123,47,255,0.3)}
.order-customer{font-size:13px;font-weight:500;margin-bottom:4px}
.order-items-preview{font-size:12px;color:var(--muted)}
.order-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.order-time{font-family:var(--font-m);font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px}
.order-total{font-family:var(--font-m);font-size:13px;color:var(--text)}
.order-actions{display:flex;gap:8px}
.action-btn{
  font-family:var(--font-m);font-size:11px;letter-spacing:0.04em;
  padding:6px 14px;border-radius:8px;cursor:pointer;border:none;
  transition:all 0.15s
}
.action-accept{background:rgba(0,255,136,0.12);color:var(--green);border:1px solid rgba(0,255,136,0.25);}
.action-accept:hover{background:rgba(0,255,136,0.22)}
.action-reject{background:rgba(255,59,59,0.1);color:var(--red);border:1px solid rgba(255,59,59,0.2);}
.action-reject:hover{background:rgba(255,59,59,0.2)}
.action-ready{background:rgba(0,212,255,0.1);color:var(--cyan);border:1px solid rgba(0,212,255,0.25);}
.action-ready:hover{background:rgba(0,212,255,0.2)}

/* ── DETAIL PANEL ── */
.detail-empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:300px;color:var(--muted);gap:10px;
  font-family:var(--font-m);font-size:12px;letter-spacing:0.06em
}
.detail-order-id{
  font-family:var(--font-m);font-size:11px;color:var(--cyan);
  letter-spacing:0.1em;padding:16px 20px;border-bottom:1px solid var(--border)
}
.detail-section{padding:16px 20px;border-bottom:1px solid var(--border2)}
.detail-section-title{font-size:11px;color:var(--muted);font-family:var(--font-m);letter-spacing:0.08em;margin-bottom:10px;text-transform:uppercase}
.detail-item{
  display:flex;justify-content:space-between;align-items:center;
  font-size:13px;padding:4px 0
}
.detail-item-qty{color:var(--cyan);font-family:var(--font-m);margin-right:8px}
.detail-item-price{color:var(--muted);font-family:var(--font-m);font-size:12px}
.detail-total{
  padding:16px 20px;
  display:flex;justify-content:space-between;
  font-family:var(--font-d);font-size:16px;font-weight:700
}
.prep-time-ctrl{
  display:flex;align-items:center;gap:12px;
  padding:12px 20px;border-top:1px solid var(--border)
}
.prep-label{font-size:12px;color:var(--muted);flex:1}
.prep-val{font-family:var(--font-m);font-size:14px;color:var(--cyan)}
.prep-btns{display:flex;gap:6px}
.prep-btn{
  width:28px;height:28px;border-radius:6px;
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s
}
.prep-btn:hover{border-color:rgba(0,212,255,0.4);color:var(--cyan)}

/* ── MENU QUICK TOGGLE ── */
.menu-item-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 20px;border-bottom:1px solid var(--border2)
}
.menu-item-info .name{font-size:13px}
.menu-item-info .price{font-family:var(--font-m);font-size:11px;color:var(--muted)}
.item-toggle{
  width:34px;height:20px;border-radius:100px;
  cursor:pointer;transition:background 0.2s;position:relative;flex-shrink:0
}
.item-toggle.on{background:var(--green)}
.item-toggle.off{background:var(--surface3)}
.item-toggle::after{
  content:'';position:absolute;
  top:2px;left:2px;width:16px;height:16px;
  background:white;border-radius:50%;
  transition:transform 0.2s
}
.item-toggle.on::after{transform:translateX(14px)}

/* ── CHART PLACEHOLDER ── */
.chart-bar-wrap{padding:16px 20px}
.chart-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.chart-bar-label{font-family:var(--font-m);font-size:11px;color:var(--muted);width:24px;text-align:right}
.chart-bar-track{flex:1;height:8px;background:var(--surface2);border-radius:100px;overflow:hidden}
.chart-bar-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--cyan),var(--violet));transition:width 1s cubic-bezier(0.4,0,0.2,1)}
.chart-bar-val{font-family:var(--font-m);font-size:11px;color:var(--muted);width:50px}

/* ── NOTIFICATION TOAST ── */
.notif{
  position:fixed;top:72px;right:20px;z-index:200;
  background:var(--surface);border:1px solid rgba(0,212,255,0.3);
  border-radius:12px;padding:14px 18px;
  display:flex;align-items:center;gap:12px;
  max-width:300px;
  transform:translateX(330px);transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1)
}
.notif.show{transform:translateX(0)}
.notif-icon{font-size:22px}
.notif-text{font-size:13px;line-height:1.5}
.notif-title{font-weight:600;color:var(--cyan);font-family:var(--font-m);font-size:11px;letter-spacing:0.06em}

@media(max-width:768px){
  .sidebar{display:none}
  .main{margin-left:0}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .section-row{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-logo-top">Atlas Delivery</div>
    <div class="sidebar-logo-main">Restaurang</div>
  </div>
  <div class="sidebar-rest">
    <div class="rest-indicator">
      <div class="rest-dot" id="restDot"></div>
      <div>
        <div class="rest-name">Norrmalm Sushi</div>
        <div class="rest-status" id="restStatusText">ÖPPEN</div>
      </div>
    </div>
  </div>
  <nav class="sidebar-nav">
    <button class="nav-item active" onclick="setPage('orders',this)"><span class="nav-icon">📋</span> Beställningar <span class="nav-badge" id="newOrderBadge">3</span></button>
    <button class="nav-item" onclick="setPage('menu',this)"><span class="nav-icon">🍽️</span> Meny</button>
    <button class="nav-item" onclick="setPage('analytics',this)"><span class="nav-icon">📊</span> Statistik</button>
    <button class="nav-item" onclick="setPage('settings',this)"><span class="nav-icon">⚙️</span> Inställningar</button>
  </nav>
  <div class="sidebar-bottom">
    <div class="toggle-row">
      <span>Restaurang öppen</span>
      <div class="toggle" id="openToggle" onclick="toggleOpen()"></div>
    </div>
  </div>
</aside>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="pageTitle">Beställningar</div>
    <div class="topbar-right">
      <div class="topbar-time" id="clock">--:--</div>
      <button class="alarm-btn" onclick="simulateOrder()">
        + Simulera beställning
      </button>
    </div>
  </div>

  <div class="content" id="pageContent">
    <!-- injected by JS -->
  </div>
</div>

<!-- NOTIFICATION -->
<div class="notif" id="notif">
  <div class="notif-icon">🔔</div>
  <div class="notif-text">
    <div class="notif-title">NY BESTÄLLNING</div>
    <div id="notifText">Ny order inkommen!</div>
  </div>
</div>

<script>
// ── DATA ──
let orders = [
  {id:'ORD-2401',customer:'Erik Lindgren',items:[{n:'California Roll x2',p:230},{n:'Spicy Tuna Roll',p:125}],total:355,status:'new',time:'14:32',address:'Sveavägen 45'},
  {id:'ORD-2400',customer:'Sara Johansson',items:[{n:'Lax Nigiri x4',p:260},{n:'Miso Soppa',p:45}],total:305,status:'preparing',time:'14:20',address:'Drottninggatan 12'},
  {id:'ORD-2399',customer:'Mikael Björk',items:[{n:'Tonfisk Sashimi',p:135},{n:'Vegetarian Maki',p:95}],total:230,status:'ready',time:'14:08',address:'Kungsgatan 78'},
  {id:'ORD-2398',customer:'Anna Persson',items:[{n:'California Roll x3',p:345}],total:345,status:'picked',time:'13:55',address:'Vasagatan 31'},
];

let selectedOrder = null;
let isOpen = true;
let currentPage = 'orders';
let prepTime = 20;
let orderCounter = 2402;

const menuItems = [
  {n:'California Roll',p:115,on:true},
  {n:'Spicy Tuna Roll',p:125,on:true},
  {n:'Vegetarian Maki',p:95,on:true},
  {n:'Lax Nigiri',p:65,on:true},
  {n:'Tonfisk Sashimi',p:135,on:true},
  {n:'Bao Buns',p:89,on:false},
  {n:'Miso Soppa',p:45,on:true},
];

const salesData = [
  {day:'Mån',val:78},{day:'Tis',val:92},{day:'Ons',val:65},
  {day:'Tor',val:110},{day:'Fre',val:145},{day:'Lör',val:188},{day:'Sön',val:130},
];
const maxSale = Math.max(...salesData.map(d=>d.val));

// ── CLOCK ──
function updateClock(){
  const n=new Date();
  document.getElementById('clock').textContent=n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0')+':'+n.getSeconds().toString().padStart(2,'0');
}
updateClock();setInterval(updateClock,1000);

// ── PAGES ──
function setPage(page,el){
  currentPage=page;
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  if(el) el.classList.add('active');
  const titles={orders:'Beställningar',menu:'Meny',analytics:'Statistik',settings:'Inställningar'};
  document.getElementById('pageTitle').textContent = titles[page];
  renderPage();
}

function renderPage(){
  const c = document.getElementById('pageContent');
  if(currentPage==='orders') renderOrders(c);
  else if(currentPage==='menu') renderMenu(c);
  else if(currentPage==='analytics') renderAnalytics(c);
  else if(currentPage==='settings') renderSettings(c);
}

// ── ORDERS ──
function renderOrders(c){
  const newCount = orders.filter(o=>o.status==='new').length;
  document.getElementById('newOrderBadge').textContent = newCount || '';
  document.getElementById('newOrderBadge').style.display = newCount ? '' : 'none';

  const today = orders.reduce((s,o)=>s+o.total,0);
  c.innerHTML = `
    <div class="stats-row">
      <div class="stat-card" style="--c1:#00D4FF;--c2:#7B2FFF">
        <div class="stat-label">Idag — Intäkter</div>
        <div class="stat-val">${today} kr</div>
        <div class="stat-change up">▲ 12% vs igår</div>
      </div>
      <div class="stat-card" style="--c1:#00FF88;--c2:#00D4FF">
        <div class="stat-label">Aktiva beställningar</div>
        <div class="stat-val">${orders.filter(o=>o.status!=='picked').length}</div>
        <div class="stat-change"><span style="color:var(--muted)">${orders.filter(o=>o.status==='new').length} nya</span></div>
      </div>
      <div class="stat-card" style="--c1:#FFB800;--c2:#FF6B35">
        <div class="stat-label">Genomsnittstid</div>
        <div class="stat-val">${prepTime} min</div>
        <div class="stat-change down">▲ 2 min vs förra veckan</div>
      </div>
      <div class="stat-card" style="--c1:#7B2FFF;--c2:#FF6B35">
        <div class="stat-label">Betyg (30d)</div>
        <div class="stat-val">4.8 ⭐</div>
        <div class="stat-change up">▲ 0.1 denna månaden</div>
      </div>
    </div>
    <div class="section-row">
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">Aktiva beställningar</div>
          <button class="panel-action" onclick="renderPage()">Uppdatera</button>
        </div>
        <div id="orderList">
          ${orders.map(o=>renderOrderItem(o)).join('')}
        </div>
      </div>
      <div class="panel" id="detailPanel">
        <div class="detail-empty">
          <div style="font-size:40px">📋</div>
          VÄLJ EN BESTÄLLNING
        </div>
      </div>
    </div>
  `;
}

function renderOrderItem(o){
  const statusLabel={new:'NY',preparing:'TILLAGAS',ready:'KLAR',picked:'HÄMTAD'};
  return `
    <div class="order-item ${selectedOrder===o.id?'selected':''}" onclick="selectOrder('${o.id}')">
      <div class="order-header">
        <div class="order-id">${o.id}</div>
        <div class="order-status status-${o.status}">${statusLabel[o.status]}</div>
      </div>
      <div class="order-customer">${o.customer}</div>
      <div class="order-items-preview">${o.items.map(i=>i.n).join(', ')}</div>
      <div class="order-footer">
        <div class="order-time">🕐 ${o.time}</div>
        <div class="order-total">${o.total} kr</div>
      </div>
      <div class="order-actions" style="margin-top:10px">
        ${o.status==='new'?`<button class="action-btn action-accept" onclick="event.stopPropagation();updateStatus('${o.id}','preparing')">✓ Acceptera</button><button class="action-btn action-reject" onclick="event.stopPropagation();rejectOrder('${o.id}')">✕ Avvisa</button>`:''}
        ${o.status==='preparing'?`<button class="action-btn action-ready" onclick="event.stopPropagation();updateStatus('${o.id}','ready')">Markera klar</button>`:''}
      </div>
    </div>
  `;
}

function selectOrder(id){
  selectedOrder = id;
  const o = orders.find(x=>x.id===id);
  const dp = document.getElementById('detailPanel');
  if(!dp || !o) return;
  const statusLabel={new:'NY',preparing:'TILLAGAS',ready:'KLAR',picked:'HÄMTAD'};
  dp.innerHTML = `
    <div class="detail-order-id">${o.id} — <span class="order-status status-${o.status}">${statusLabel[o.status]}</span></div>
    <div class="detail-section">
      <div class="detail-section-title">Kund</div>
      <div class="detail-item"><span>${o.customer}</span></div>
      <div class="detail-item" style="color:var(--muted);font-size:12px">📍 ${o.address}</div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">Beställda rätter</div>
      ${o.items.map(i=>`
        <div class="detail-item">
          <span>${i.n}</span>
          <span class="detail-item-price">${i.p} kr</span>
        </div>
      `).join('')}
    </div>
    <div class="detail-total"><span>Totalt</span><span style="color:var(--cyan)">${o.total} kr</span></div>
    <div class="prep-time-ctrl">
      <div class="prep-label">Tillagingstid</div>
      <div class="prep-val" id="prepDisplay">${prepTime} min</div>
      <div class="prep-btns">
        <button class="prep-btn" onclick="changePrepTime(-5)">−</button>
        <button class="prep-btn" onclick="changePrepTime(5)">+</button>
      </div>
    </div>
  `;
  document.querySelectorAll('.order-item').forEach(el=>el.classList.remove('selected'));
  document.querySelectorAll('.order-item').forEach(el=>{
    if(el.querySelector('.order-id').textContent===id) el.classList.add('selected');
  });
}

function updateStatus(id, newStatus){
  const o = orders.find(x=>x.id===id);
  if(o) o.status=newStatus;
  renderPage();
  showNotif(`${id} uppdaterad → ${newStatus.toUpperCase()}`);
}
function rejectOrder(id){
  orders = orders.filter(x=>x.id!==id);
  renderPage();
  showNotif(`${id} avvisad`);
}
function changePrepTime(d){
  prepTime=Math.max(5,prepTime+d);
  const el=document.getElementById('prepDisplay');
  if(el) el.textContent=prepTime+' min';
}

// ── OPEN TOGGLE ──
function toggleOpen(){
  isOpen=!isOpen;
  const t=document.getElementById('openToggle');
  const d=document.getElementById('restDot');
  const s=document.getElementById('restStatusText');
  t.classList.toggle('off',!isOpen);
  d.style.background=isOpen?'var(--green)':'var(--muted)';
  d.style.boxShadow=isOpen?'0 0 8px var(--green)':'none';
  s.textContent=isOpen?'ÖPPEN':'STÄNGD';
  s.style.color=isOpen?'var(--green)':'var(--muted)';
  showNotif(isOpen?'Restaurangen är nu öppen!':'Restaurangen är nu stängd.');
}

// ── SIMULATE NEW ORDER ──
function simulateOrder(){
  const names=['Lars Eriksson','Petra Holm','Jonas Lindqvist','Maja Strand'];
  const items=[
    [{n:'California Roll x2',p:230}],
    [{n:'Spicy Tuna Roll',p:125},{n:'Miso Soppa',p:45}],
    [{n:'Tonfisk Sashimi x2',p:270}],
  ];
  const sample=items[Math.floor(Math.random()*items.length)];
  const total=sample.reduce((s,i)=>s+i.p,0);
  const n=new Date();
  const time=n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');
  const order={
    id:`ORD-${orderCounter++}`,
    customer:names[Math.floor(Math.random()*names.length)],
    items:sample,total,status:'new',time,
    address:'Stockholm'
  };
  orders.unshift(order);
  if(currentPage==='orders') renderPage();
  showNotif(`Ny beställning från ${order.customer}!`);
}

// ── NOTIFICATION ──
function showNotif(msg){
  document.getElementById('notifText').textContent=msg;
  const el=document.getElementById('notif');
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3000);
}

// ── INIT ──
renderPage();
</script>
