<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas Delivery — Restaurang</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#090909;--bg2:#0f0f0f;--bg3:#141414;--card:#181818;--card2:#1e1e1e;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  --accent:#00D4FF;--violet:#7B2FFF;--green:#00C853;--orange:#FF6B35;
  --red:#F44336;--yellow:#FFC107;--text:#F2F2F2;--text2:#888;--text3:#444;
  --font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;--sw:220px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;font-size:14px}
/* LOGIN */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)}
.lb{width:380px;padding:40px 34px;background:var(--bg2);border:1px solid var(--border2);border-radius:4px}
.lb-brand{font-size:9px;letter-spacing:4px;color:var(--text3);text-transform:uppercase;font-family:var(--mono)}
.lb-h1{font-size:22px;font-weight:700;margin:4px 0;letter-spacing:-.3px}
.lb-h1 .a{color:var(--accent)}
.lb-role{display:inline-block;margin-top:6px;padding:3px 10px;background:rgba(255,107,53,.1);border:1px solid rgba(255,107,53,.25);border-radius:2px;font-size:10px;color:var(--orange);letter-spacing:2px;font-family:var(--mono)}
.fg{margin-bottom:13px}
.fg label{display:block;font-size:9px;letter-spacing:2px;color:var(--text2);margin-bottom:5px;text-transform:uppercase;font-family:var(--mono)}
.fg input{width:100%;padding:10px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:2px;color:var(--text);font-family:var(--mono);font-size:13px;outline:none;transition:.15s}
.fg input:focus{border-color:var(--accent)}.fg input::placeholder{color:var(--text3)}
.btn-lg{width:100%;padding:11px;background:var(--accent);border:none;border-radius:2px;color:#000;font-size:14px;font-weight:600;cursor:pointer}
.lerr{margin-top:9px;padding:8px 11px;background:rgba(244,67,54,.08);border:1px solid rgba(244,67,54,.2);border-radius:2px;color:var(--red);font-size:11px;font-family:var(--mono);display:none}
/* APP */
#appShell{display:none;flex-direction:row;min-height:100vh}
/* SIDEBAR */
.sb{width:var(--sw);min-height:100vh;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:100}
.sb-hdr{padding:18px 16px 14px;border-bottom:1px solid var(--border)}
.sb-brand{font-size:8px;letter-spacing:4px;color:var(--text3);text-transform:uppercase;font-family:var(--mono)}
.sb-name{font-size:16px;font-weight:700;margin:3px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-name .dot{color:var(--orange)}
.status-pill{display:flex;align-items:center;gap:8px;margin-top:8px;padding:7px 11px;background:var(--bg3);border-radius:2px;cursor:pointer;border:1px solid var(--border);transition:.15s}
.s-dot{width:6px;height:6px;border-radius:50%;background:var(--red);flex-shrink:0;transition:.3s}
.s-dot.on{background:var(--green);box-shadow:0 0 6px var(--green)}
.s-txt{font-size:11px;color:var(--text2);font-family:var(--mono)}
.sb-nav{flex:1;padding:10px 6px;overflow-y:auto}
.ni{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:2px;cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;transition:.15s;margin-bottom:1px;position:relative}
.ni:hover{background:var(--bg3);color:var(--text)}
.ni.active{background:rgba(0,212,255,.07);color:var(--accent);border-left:2px solid var(--accent);padding-left:10px}
.ni-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.ni-badge{margin-left:auto;background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:1px 6px;border-radius:10px;font-family:var(--mono)}
.sb-footer{padding:12px 6px;border-top:1px solid var(--border)}
.btn-lo{width:100%;padding:8px 11px;background:transparent;border:1px solid var(--border);border-radius:2px;color:var(--text2);font-family:var(--font);font-size:12px;cursor:pointer;text-align:left;display:flex;align-items:center;gap:8px}
.btn-lo:hover{border-color:var(--red);color:var(--red)}
/* MAIN */
.main{margin-left:var(--sw);flex:1;min-height:100vh;background:var(--bg)}
.topbar{padding:14px 26px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.tb-title{font-size:17px;font-weight:700;letter-spacing:-.3px}
.live-badge{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--green);font-family:var(--mono);letter-spacing:2px}
.live-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:lp 2s infinite}
@keyframes lp{0%,100%{opacity:1}50%{opacity:.3}}
.page{padding:22px 26px;display:none}
.page.active{display:block}
/* KANBAN */
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.col-lbl{padding:9px 13px;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;font-family:var(--mono);display:flex;align-items:center;justify-content:space-between;border-radius:2px 2px 0 0}
.col-body{background:var(--card);border:1px solid var(--border);border-top:none;border-radius:0 0 4px 4px;padding:9px;min-height:380px}
.col-nya .col-lbl{background:rgba(0,212,255,.06);color:var(--accent);border:1px solid rgba(0,212,255,.15);border-bottom:none}
.col-cook .col-lbl{background:rgba(255,193,7,.06);color:var(--yellow);border:1px solid rgba(255,193,7,.15);border-bottom:none}
.col-rdy .col-lbl{background:rgba(0,200,83,.06);color:var(--green);border:1px solid rgba(0,200,83,.15);border-bottom:none}
.col-hmt .col-lbl{background:rgba(123,47,255,.06);color:var(--violet);border:1px solid rgba(123,47,255,.15);border-bottom:none}
/* ORDER CARD */
.oc{background:var(--card2);border:1px solid var(--border);border-radius:2px;padding:11px;margin-bottom:7px;cursor:pointer;transition:.15s;position:relative}
.oc:hover{border-color:var(--border2);transform:translateY(-1px)}
.oc:hover .oc-holo{display:block}
.oc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.oc-id{font-family:var(--mono);font-size:10px;color:var(--accent)}
.oc-time{font-family:var(--mono);font-size:10px;color:var(--text2)}
.oc-name{font-size:13px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.oc-items{font-size:11px;color:var(--text2);margin-bottom:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.oc-foot{display:flex;justify-content:space-between;align-items:center}
.oc-total{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--green)}
.oc-acts{display:flex;gap:4px}
.btn-oa{padding:5px 9px;border-radius:2px;font-size:10px;font-weight:600;cursor:pointer;border:none;font-family:var(--mono);letter-spacing:.5px;transition:.15s}
.btn-accept{background:rgba(0,212,255,.1);color:var(--accent);border:1px solid rgba(0,212,255,.25)}.btn-accept:hover{background:var(--accent);color:#000}
.btn-ready{background:rgba(0,200,83,.1);color:var(--green);border:1px solid rgba(0,200,83,.25)}.btn-ready:hover{background:var(--green);color:#000}
.btn-chat-s{background:rgba(123,47,255,.1);color:var(--violet);border:1px solid rgba(123,47,255,.25)}.btn-chat-s:hover{background:var(--violet);color:#fff}
/* HOLOGRAM */
.oc-holo{display:none;position:absolute;left:calc(100% + 9px);top:0;width:250px;z-index:999;
  background:#0a0a0a;border:1px solid rgba(0,212,255,.35);border-radius:3px;padding:12px 14px;
  box-shadow:0 8px 28px rgba(0,0,0,.7)}
.oc-holo::before{content:'';position:absolute;left:-6px;top:14px;border:6px solid transparent;border-right-color:rgba(0,212,255,.35);border-left:none}
.holo-t{font-size:8px;letter-spacing:3px;color:var(--accent);text-transform:uppercase;font-family:var(--mono);margin-bottom:8px}
.holo-r{display:flex;justify-content:space-between;margin-bottom:4px;font-size:11px;gap:8px}
.holo-k{color:var(--text3);font-family:var(--mono);flex-shrink:0}
.holo-v{color:var(--text);font-weight:500;text-align:right;word-break:break-word}
.holo-sep{border:none;border-top:1px solid var(--border);margin:6px 0}
/* MENY */
.meny-tb{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
.btn-add-item{padding:8px 15px;background:var(--accent);border:none;border-radius:2px;color:#000;font-size:12px;font-weight:600;cursor:pointer}
.btn-sec{padding:8px 12px;background:transparent;border:1px solid var(--border2);border-radius:2px;color:var(--text2);font-size:12px;cursor:pointer;transition:.15s}
.btn-sec:hover{border-color:var(--accent);color:var(--accent)}
.ftabs{display:flex;gap:4px;flex-wrap:wrap}
.ftab{padding:5px 12px;border-radius:2px;font-size:10px;font-weight:500;cursor:pointer;background:transparent;border:1px solid var(--border);color:var(--text2);transition:.15s;font-family:var(--mono)}
.ftab.active{background:rgba(0,212,255,.07);border-color:rgba(0,212,255,.25);color:var(--accent)}
.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.mc{background:var(--card);border:1px solid var(--border);border-radius:2px;padding:13px;transition:.15s}
.mc:hover{border-color:var(--border2)}
.mc.off{opacity:.45}
.mc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px}
.mc-emoji{font-size:30px;line-height:1}
.mc-tgl{width:36px;height:20px;background:var(--bg3);border-radius:20px;border:1px solid var(--border);cursor:pointer;position:relative;transition:.3s;flex-shrink:0}
.mc-tgl.on{background:rgba(0,200,83,.2);border-color:var(--green)}
.mc-tgl::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:var(--text3);transition:.3s}
.mc-tgl.on::after{left:18px;background:var(--green)}
.mc-name{font-size:14px;font-weight:600;margin-bottom:3px}
.mc-desc{font-size:11px;color:var(--text2);margin-bottom:7px;line-height:1.4}
.allergen-tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:6px}
.at{padding:2px 6px;border-radius:2px;font-size:9px;font-weight:600;font-family:var(--mono)}
.at-g{background:rgba(255,107,53,.1);color:var(--orange);border:1px solid rgba(255,107,53,.2)}
.at-l{background:rgba(255,193,7,.1);color:var(--yellow);border:1px solid rgba(255,193,7,.2)}
.at-n{background:rgba(244,67,54,.1);color:var(--red);border:1px solid rgba(244,67,54,.2)}
.at-v{background:rgba(0,200,83,.1);color:var(--green);border:1px solid rgba(0,200,83,.2)}
.at-o{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.addon-tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:6px}
.addon-tag{padding:2px 6px;border-radius:2px;font-size:9px;font-family:var(--mono);background:rgba(123,47,255,.1);color:var(--violet);border:1px solid rgba(123,47,255,.2)}
.mc-foot{display:flex;justify-content:space-between;align-items:center;margin-top:7px;padding-top:7px;border-top:1px solid var(--border)}
.mc-price{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--accent)}
.mc-cat{font-size:9px;color:var(--text3);font-family:var(--mono)}
.btn-edit-mc{padding:4px 9px;background:transparent;border:1px solid var(--border);border-radius:2px;color:var(--text2);font-size:10px;cursor:pointer;transition:.15s;width:100%;margin-top:7px;text-align:center}
.btn-edit-mc:hover{border-color:var(--accent);color:var(--accent)}
/* HISTORIK */
.hist-tbl{width:100%;border-collapse:collapse;font-size:12px}
.hist-tbl th{padding:9px 13px;text-align:left;font-size:9px;letter-spacing:2px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;border-bottom:1px solid var(--border);font-weight:500}
.hist-tbl td{padding:10px 13px;border-bottom:1px solid rgba(255,255,255,.03);color:var(--text2)}
.hist-tbl tr:hover td{background:rgba(255,255,255,.02)}
/* STATISTIK */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:22px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:2px;padding:16px}
.sc-lbl{font-size:9px;letter-spacing:2px;color:var(--text2);text-transform:uppercase;font-family:var(--mono)}
.sc-val{font-size:26px;font-weight:700;margin-top:6px}
.sc-val.c{color:var(--accent)}.sc-val.g{color:var(--green)}.sc-val.o{color:var(--orange)}.sc-val.v{color:var(--violet)}
/* KONTO */
.konto-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.k-sec{background:var(--card);border:1px solid var(--border);border-radius:2px;padding:18px}
.k-sec.full{grid-column:1/-1}
.k-title{font-size:10px;font-weight:700;color:var(--accent);font-family:var(--mono);letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;padding-bottom:7px;border-bottom:1px solid var(--border)}
.k-fg{margin-bottom:12px}
.k-lbl{display:block;font-size:9px;letter-spacing:2px;color:var(--text2);font-family:var(--mono);text-transform:uppercase;margin-bottom:5px}
.k-inp{width:100%;padding:9px 11px;background:var(--bg3);border:1px solid var(--border);border-radius:2px;color:var(--text);font-family:var(--mono);font-size:12px;outline:none;transition:.15s}
.k-inp:focus{border-color:var(--accent)}.k-inp::placeholder{color:var(--text3)}
.k-ta{min-height:72px;resize:vertical}
.btn-save{padding:9px 18px;background:var(--accent);border:none;border-radius:2px;color:#000;font-weight:600;font-size:12px;cursor:pointer}
.btn-danger{padding:9px 16px;background:transparent;border:1px solid rgba(244,67,54,.3);border-radius:2px;color:var(--red);font-size:12px;cursor:pointer}
/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.75);backdrop-filter:blur(3px);align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:3px;padding:22px;width:480px;max-width:95vw;max-height:86vh;overflow-y:auto;position:relative}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px}
.modal-close{position:absolute;top:14px;right:14px;background:transparent;border:1px solid var(--border);border-radius:2px;color:var(--text2);font-size:14px;cursor:pointer;width:26px;height:26px;display:flex;align-items:center;justify-content:center}
.modal-close:hover{border-color:var(--red);color:var(--red)}
.mg{margin-bottom:13px}
.ml{font-size:9px;letter-spacing:2px;color:var(--text2);font-family:var(--mono);text-transform:uppercase;display:block;margin-bottom:5px}
.mi{width:100%;padding:9px 11px;background:var(--bg3);border:1px solid var(--border);border-radius:2px;color:var(--text);font-family:var(--mono);font-size:12px;outline:none;transition:.15s}
.mi:focus{border-color:var(--accent)}.mi::placeholder{color:var(--text3)}
.ms{width:100%;padding:9px 11px;background:var(--bg3);border:1px solid var(--border);border-radius:2px;color:var(--text);font-family:var(--font);font-size:12px;outline:none;cursor:pointer}
.mta{min-height:70px;resize:vertical}
.allergen-cbs{display:flex;flex-wrap:wrap;gap:5px}
.acb{display:flex;align-items:center;gap:4px;padding:4px 9px;background:var(--bg3);border:1px solid var(--border);border-radius:2px;cursor:pointer;font-size:11px;transition:.15s;font-family:var(--mono)}
.acb input{display:none}
.acb.checked{background:rgba(0,212,255,.07);border-color:rgba(0,212,255,.25);color:var(--accent)}
/* TILLÄGG ROWS */
.addon-row{display:flex;gap:7px;align-items:center;margin-bottom:5px}
.addon-row input{flex:1;padding:7px 9px;background:var(--bg3);border:1px solid var(--border);border-radius:2px;color:var(--text);font-family:var(--mono);font-size:11px;outline:none}
.addon-row input:focus{border-color:var(--accent)}
.addon-row .ap{width:80px}
.btn-rm-addon{background:transparent;border:1px solid rgba(244,67,54,.25);border-radius:2px;color:var(--red);font-size:11px;padding:4px 7px;cursor:pointer;flex-shrink:0}
.btn-add-addon{padding:6px 11px;background:rgba(123,47,255,.12);border:1px solid rgba(123,47,255,.25);border-radius:2px;color:var(--violet);font-size:11px;cursor:pointer;font-family:var(--mono)}
.modal-foot{display:flex;gap:7px;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:1px solid var(--border)}
.btn-ms{padding:9px 18px;background:var(--accent);border:none;border-radius:2px;color:#000;font-weight:600;font-size:12px;cursor:pointer}
.btn-mc{padding:9px 16px;background:transparent;border:1px solid var(--border);border-radius:2px;color:var(--text2);font-size:12px;cursor:pointer}
.btn-mc:hover{border-color:var(--red);color:var(--red)}
.btn-md{padding:9px 14px;background:rgba(244,67,54,.07);border:1px solid rgba(244,67,54,.2);border-radius:2px;color:var(--red);font-size:12px;cursor:pointer}
/* CAT MODAL */
.cat-item{display:flex;align-items:center;gap:7px;padding:7px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:2px;margin-bottom:5px}
.cat-n{flex:1;font-size:13px}
.cat-c{font-family:var(--mono);font-size:10px;color:var(--text3)}
.btn-sms{padding:3px 8px;background:transparent;border:1px solid var(--border);border-radius:2px;color:var(--text2);font-size:10px;cursor:pointer;font-family:var(--mono)}
.btn-sms-r{border-color:rgba(244,67,54,.2);color:var(--red)}
/* CHAT DRAWER */
.chat-drawer{position:fixed;right:-420px;top:0;bottom:0;width:400px;background:var(--bg2);border-left:1px solid var(--border2);z-index:500;transition:.3s;display:flex;flex-direction:column}
.chat-drawer.open{right:0;box-shadow:-8px 0 30px rgba(0,0,0,.5)}
.ch-hdr{padding:16px 18px;border-bottom:1px solid var(--border);position:relative}
.ch-close{position:absolute;top:12px;right:12px;background:transparent;border:1px solid var(--border);border-radius:2px;color:var(--text2);font-size:14px;cursor:pointer;width:27px;height:27px;display:flex;align-items:center;justify-content:center}
.ch-ord-id{font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:2px}
.ch-ord-title{font-size:15px;font-weight:700;margin-top:2px}
.ch-tabs{display:flex;gap:3px;padding:8px 12px;border-bottom:1px solid var(--border)}
.ch-tab{flex:1;padding:6px;border-radius:2px;text-align:center;font-size:10px;font-weight:600;cursor:pointer;background:var(--bg3);border:1px solid var(--border);color:var(--text2);transition:.15s;font-family:var(--mono)}
.ch-tab.active{background:rgba(0,212,255,.07);border-color:rgba(0,212,255,.25);color:var(--accent)}
.chat-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:6px}
.c-msg{padding:8px 11px;border-radius:2px;max-width:84%;font-size:12px;line-height:1.4}
.c-msg.me{background:rgba(0,212,255,.07);border:1px solid rgba(0,212,255,.16);align-self:flex-end}
.c-msg.other{background:var(--card2);border:1px solid var(--border);align-self:flex-start}
.c-sender{font-size:9px;color:var(--text3);margin-bottom:2px;font-family:var(--mono);text-transform:uppercase}
.c-time{font-size:9px;color:var(--text3);margin-top:2px;font-family:var(--mono);text-align:right}
.chat-inp-row{padding:12px;border-top:1px solid var(--border);display:flex;gap:6px}
.chat-inp{flex:1;padding:9px 11px;background:var(--bg3);border:1px solid var(--border);border-radius:2px;color:var(--text);font-family:var(--font);font-size:12px;outline:none}
.chat-inp:focus{border-color:var(--accent)}
.chat-send{padding:9px 13px;background:var(--accent);border:none;border-radius:2px;color:#000;font-weight:700;font-size:12px;cursor:pointer}
.toast-el{position:fixed;bottom:20px;right:20px;z-index:9999;padding:10px 16px;background:var(--bg2);border:1px solid var(--green);border-radius:2px;color:var(--text);font-size:12px;font-weight:600;font-family:var(--mono);box-shadow:0 4px 14px rgba(0,0,0,.4);animation:tIn .3s ease}
@keyframes tIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.empty-col{text-align:center;padding:30px 10px;color:var(--text3);font-family:var(--mono);font-size:11px}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-thumb{background:var(--border)}
</style>
</head>
<body>
<!-- LOGIN -->
<div id="loginScreen">
  <div class="lb">
    <div class="lb-brand">Abkär-SE · Atlas Valley</div>
    <div class="lb-h1">Atlas <span class="a">Delivery</span></div>
    <div class="lb-role">🍽️ RESTAURANG</div>
    <div style="height:20px"></div>
    <div class="fg"><label>E-post</label><input type="email" id="lEmail" placeholder="restaurant@atlasdel.se"></div>
    <div class="fg"><label>Lösenord</label><input type="password" id="lPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn-lg" onclick="doLogin()">Logga in</button>
    <div class="lerr" id="lErr"></div>
  </div>
</div>
<!-- APP -->
<div id="appShell">
  <nav class="sb">
    <div class="sb-hdr">
      <div class="sb-brand">Atlas Delivery</div>
      <div class="sb-name" id="sbName">Restaurang<span class="dot">.</span></div>
      <div class="status-pill" onclick="toggleStatus()" id="statusPill">
        <div class="s-dot" id="sDot"></div><span class="s-txt" id="sTxt">Stängd</span>
      </div>
    </div>
    <div class="sb-nav">
      <div class="ni active" onclick="goTo('orders')" id="nav-orders"><span class="ni-icon">📋</span> Ordrar<span class="ni-badge" id="newBadge" style="display:none">0</span></div>
      <div class="ni" onclick="goTo('meny')" id="nav-meny"><span class="ni-icon">🍴</span> Meny</div>
      <div class="ni" onclick="goTo('historik')" id="nav-historik"><span class="ni-icon">📊</span> Historik</div>
      <div class="ni" onclick="goTo('statistik')" id="nav-statistik"><span class="ni-icon">📈</span> Statistik</div>
      <div class="ni" onclick="goTo('konto')" id="nav-konto"><span class="ni-icon">🏪</span> Konto</div>
    </div>
    <div class="sb-footer">
      <button class="btn-lo" onclick="doLogout()">⎋ &nbsp;Logga ut</button>
    </div>
  </nav>
  <div class="main">
    <div class="topbar">
      <div class="tb-title" id="tbTitle">Ordrar</div>
      <div class="live-badge">LIVE</div>
    </div>
    <div id="mainContent"></div>
  </div>
</div>
<!-- CHAT DRAWER -->
<div class="chat-drawer" id="chatDrawer">
  <div class="ch-hdr">
    <button class="ch-close" onclick="closeChat()">✕</button>
    <div class="ch-ord-id" id="chatOrdId">ORDER</div>
    <div class="ch-ord-title">Konversation</div>
  </div>
  <div class="ch-tabs">
    <div class="ch-tab active" onclick="switchCh('customer')" id="cht-customer">👤 KUND</div>
    <div class="ch-tab" onclick="switchCh('rider')" id="cht-rider">🛵 BUD</div>
    <div class="ch-tab" onclick="switchCh('dev')" id="cht-dev">⚡ SUPPORT</div>
  </div>
  <div class="chat-msgs" id="chatMsgs"></div>
  <div class="chat-inp-row">
    <input class="chat-inp" id="chatInput" placeholder="Skriv..." onkeydown="if(event.key==='Enter')sendMsg()">
    <button class="chat-send" onclick="sendMsg()">→</button>
  </div>
</div>
<!-- ITEM MODAL -->
<div class="modal-bg" id="itemModal">
  <div class="modal">
    <button class="modal-close" onclick="closeItemModal()">✕</button>
    <div class="modal-title" id="itemModalTitle">Ny rätt</div>
    <div style="display:grid;grid-template-columns:1fr 76px;gap:10px">
      <div class="mg"><label class="ml">Namn</label><input class="mi" id="iName" placeholder="Ex: Klassisk Burger"></div>
      <div class="mg"><label class="ml">Emoji</label><input class="mi" id="iEmoji" placeholder="🍔"></div>
    </div>
    <div class="mg"><label class="ml">Beskrivning</label><textarea class="mi mta" id="iDesc" placeholder="Kort beskrivning..."></textarea></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="mg"><label class="ml">Pris (kr)</label><input class="mi" id="iPrice" type="number" placeholder="149"></div>
      <div class="mg"><label class="ml">Kategori</label><select class="ms" id="iCat"></select></div>
    </div>
    <div class="mg"><label class="ml">Allergener</label>
      <div class="allergen-cbs" id="acbs">
        <label class="acb" onclick="tgAl(this)"><input type="checkbox" value="Gluten"> Gluten</label>
        <label class="acb" onclick="tgAl(this)"><input type="checkbox" value="Laktos"> Laktos</label>
        <label class="acb" onclick="tgAl(this)"><input type="checkbox" value="Nötter"> Nötter</label>
        <label class="acb" onclick="tgAl(this)"><input type="checkbox" value="Ägg"> Ägg</label>
        <label class="acb" onclick="tgAl(this)"><input type="checkbox" value="Soja"> Soja</label>
        <label class="acb" onclick="tgAl(this)"><input type="checkbox" value="Vegan"> Vegan</label>
        <label class="acb" onclick="tgAl(this)"><input type="checkbox" value="Vegetarisk"> Vegetarisk</label>
      </div>
    </div>
    <div class="mg">
      <label class="ml" style="display:flex;justify-content:space-between;align-items:center">
        Tillägg <button class="btn-add-addon" onclick="addAddon()">+ Tillägg</button>
      </label>
      <div id="addonRows"></div>
    </div>
    <div class="modal-foot">
      <button class="btn-md" id="iDelBtn" onclick="deleteItem()" style="display:none">Ta bort</button>
      <button class="btn-mc" onclick="closeItemModal()">Avbryt</button>
      <button class="btn-ms" onclick="saveItem()">Spara</button>
    </div>
  </div>
</div>
<!-- CAT MODAL -->
<div class="modal-bg" id="catModal">
  <div class="modal" style="max-width:380px">
    <button class="modal-close" onclick="document.getElementById('catModal').classList.remove('open')">✕</button>
    <div class="modal-title">Kategorier</div>
    <div id="catListEl"></div>
    <div style="display:flex;gap:7px;margin-top:8px">
      <input class="mi" id="newCatInp" placeholder="Ny kategori..." style="flex:1">
      <button class="btn-ms" onclick="addCat()">Lägg till</button>
    </div>
  </div>
</div>

<script>
const SB=supabase.createClient('https://vgtdswplzuhbhhlmxrgg.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZndGRzd3BsenVoYmhobG14cmdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMTY2ODIsImV4cCI6MjA4ODU5MjY4Mn0.82sk-40cQo7NxeRWUgthTzp_fk1TlBcqPchrBGGIFnU');
let REST=null,ORDERS=[],MENU=[],CATS=[],isOpen=false;
let chatOrderId=null,chatCh='customer',chatSub=null,orderSub=null;
let editItemId=null,activeFilter='all',currentPage='orders';

async function doLogin(){
  const email=document.getElementById('lEmail').value.trim();
  const pass=document.getElementById('lPass').value.trim();
  if(!email||!pass){setErr('Fyll i alla fält');return}
  const {data,error}=await SB.auth.signInWithPassword({email,password:pass});
  if(error){setErr('Fel inloggning');return}
  let rest=null;
  const {data:r1}=await SB.from('restaurants').select('*').eq('auth_user_id',data.user.id).single();rest=r1;
  if(!rest){const {data:r2}=await SB.from('restaurants').select('*').eq('email',email).single();rest=r2}
  if(!rest){setErr('Ingen restaurang kopplad');await SB.auth.signOut();return}
  REST=rest;loadApp();
}
function setErr(m){const e=document.getElementById('lErr');e.style.display='block';e.textContent=m}
async function doLogout(){await SB.auth.signOut();location.reload()}

async function loadApp(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appShell').style.display='flex';
  document.getElementById('sbName').innerHTML=REST.name+'<span class="dot">.</span>';
  isOpen=REST.is_open||false;
  document.getElementById('sDot').classList.toggle('on',isOpen);
  document.getElementById('sTxt').textContent=isOpen?'Öppen':'Stängd';
  await loadMenu();await loadCats();subscribeOrders();renderPage('orders');
}

async function loadMenu(){const {data}=await SB.from('menu_items').select('*').eq('restaurant_id',REST.id).order('sort_order');MENU=data||[]}
async function loadCats(){
  const {data}=await SB.from('menu_categories').select('*').eq('restaurant_id',REST.id).order('sort_order');
  if(data&&data.length)CATS=data.map(c=>c.name);
  else{CATS=[...new Set(MENU.map(i=>i.category).filter(Boolean))];if(!CATS.length)CATS=['Rätter']}
}
function subscribeOrders(){
  if(orderSub)SB.removeChannel(orderSub);
  orderSub=SB.channel('rest-ord-'+REST.id)
    .on('postgres_changes',{event:'*',schema:'public',table:'orders',filter:`restaurant_id=eq.${REST.id}`},async()=>{
      await loadOrders();if(currentPage==='orders')renderOrdersPage();
    }).subscribe();
  loadOrders().then(()=>{if(currentPage==='orders')renderOrdersPage()});
}
async function loadOrders(){
  const {data}=await SB.from('orders').select('*').eq('restaurant_id',REST.id).in('status',['pending','paid','accepted','ready','picked']).order('created_at',{ascending:false});
  ORDERS=data||[];
  const n=ORDERS.filter(o=>o.status==='pending'||o.status==='paid').length;
  const b=document.getElementById('newBadge');n>0?(b.style.display='inline',b.textContent=n):b.style.display='none';
}

function goTo(pg){
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('active'));
  document.getElementById('nav-'+pg)?.classList.add('active');
  currentPage=pg;
  const t={orders:'Ordrar',meny:'Meny',historik:'Historik',statistik:'Statistik',konto:'Konto'};
  document.getElementById('tbTitle').textContent=t[pg]||pg;
  renderPage(pg);
}
function renderPage(pg){
  if(pg==='orders')renderOrdersPage();
  else if(pg==='meny')renderMenyPage();
  else if(pg==='historik')renderHistorikPage();
  else if(pg==='statistik')renderStatistikPage();
  else if(pg==='konto')renderKontoPage();
}

function renderOrdersPage(){
  const nya=ORDERS.filter(o=>o.status==='pending'||o.status==='paid');
  const cook=ORDERS.filter(o=>o.status==='accepted');
  const rdy=ORDERS.filter(o=>o.status==='ready');
  const hmt=ORDERS.filter(o=>o.status==='picked');
  document.getElementById('mainContent').innerHTML=`
    <div class="page active" style="padding:22px 26px">
      <div style="font-size:11px;color:var(--text2);font-family:var(--mono);margin-bottom:16px">${REST.name} · ${ORDERS.length} aktiva ordrar</div>
      <div class="kanban">
        <div class="col-nya"><div class="col-lbl">NYA <span>${nya.length}</span></div><div class="col-body">${nya.map(ordCard).join('')||'<div class="empty-col">Inga nya</div>'}</div></div>
        <div class="col-cook"><div class="col-lbl">TILLAGAS <span>${cook.length}</span></div><div class="col-body">${cook.map(ordCard).join('')||'<div class="empty-col">–</div>'}</div></div>
        <div class="col-rdy"><div class="col-lbl">KLAR <span>${rdy.length}</span></div><div class="col-body">${rdy.map(ordCard).join('')||'<div class="empty-col">Inga klara</div>'}</div></div>
        <div class="col-hmt"><div class="col-lbl">HÄMTAD <span>${hmt.length}</span></div><div class="col-body">${hmt.map(ordCard).join('')||'<div class="empty-col">–</div>'}</div></div>
      </div>
    </div>`;
}
function ordCard(o){
  const items=Array.isArray(o.items)?o.items:JSON.parse(o.items||'[]');
  const txt=items.map(i=>`${i.quantity||1}× ${i.name}`).join(', ');
  const ts=new Date(o.created_at).toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'});
  const total=o.total_amount||o.total||0,fee=o.delivery_fee||0,tip=o.tip||0,food=total-fee-tip;
  const phone=o.customer_phone||'–',addr=o.customer_address||o.delivery_address||'–';
  let acts='';
  if(o.status==='pending'||o.status==='paid')acts=`<button class="btn-oa btn-accept" onclick="updOrd('${o.id}','accepted')">ACCEPTERA</button>`;
  else if(o.status==='accepted')acts=`<button class="btn-oa btn-ready" onclick="updOrd('${o.id}','ready')">KLAR</button>`;
  acts+=`<button class="btn-oa btn-chat-s" onclick="openChat('${o.id}')">💬</button>`;
  return`<div class="oc">
    <div class="oc-top"><span class="oc-id">${o.id?.slice(0,8)}</span><span class="oc-time">${ts}</span></div>
    <div class="oc-name">${o.customer_name||'Kund'}</div>
    <div class="oc-items">${txt}</div>
    <div class="oc-foot"><span class="oc-total">${total} kr</span><div class="oc-acts">${acts}</div></div>
    <div class="oc-holo">
      <div class="holo-t">ORDERINFO</div>
      <div class="holo-r"><span class="holo-k">Kund</span><span class="holo-v">${o.customer_name||'–'}</span></div>
      <div class="holo-r"><span class="holo-k">Tel</span><span class="holo-v">${phone}</span></div>
      <div class="holo-r"><span class="holo-k">Adress</span><span class="holo-v">${addr}</span></div>
      <hr class="holo-sep">
      <div class="holo-r"><span class="holo-k">Mat</span><span class="holo-v">${food.toFixed(0)} kr</span></div>
      <div class="holo-r"><span class="holo-k">Leverans</span><span class="holo-v">${fee} kr</span></div>
      <div class="holo-r"><span class="holo-k">Dricks</span><span class="holo-v">${tip} kr</span></div>
      <div class="holo-r"><span class="holo-k" style="color:var(--green)">Totalt</span><span class="holo-v" style="color:var(--green)">${total} kr</span></div>
      <hr class="holo-sep">
      <div class="holo-r"><span class="holo-k">Artiklar</span><span class="holo-v">${txt}</span></div>
    </div>
  </div>`;
}
async function updOrd(id,status){
  const {error}=await SB.from('orders').update({status}).eq('id',id);
  if(error){toast('❌ '+error.message);return}
  toast('✅ Order → '+status);await loadOrders();renderOrdersPage();
}

function renderMenyPage(){
  const cats=['all',...CATS];
  const filtered=activeFilter==='all'?MENU:MENU.filter(i=>i.category===activeFilter);
  document.getElementById('mainContent').innerHTML=`
    <div class="page active" style="padding:22px 26px">
      <div style="font-size:11px;color:var(--text2);font-family:var(--mono);margin-bottom:14px">${MENU.length} rätter · ${CATS.length} kategorier</div>
      <div class="meny-tb">
        <button class="btn-add-item" onclick="openItemModal()">+ Lägg till rätt</button>
        <button class="btn-sec" onclick="openCatModal()">⚙ Kategorier</button>
        <div class="ftabs">${cats.map(c=>`<div class="ftab ${activeFilter===c?'active':''}" onclick="setFilter('${c}')">${c==='all'?'Alla':c}</div>`).join('')}</div>
      </div>
      <div class="menu-grid">${filtered.map(menuCard).join('')||'<div style="color:var(--text3);font-size:12px;font-family:var(--mono)">Inga rätter</div>'}</div>
    </div>`;
}
function menuCard(item){
  const als=item.allergens||[],ads=item.addons||[];
  const alHtml=als.map(a=>{const c=a.toLowerCase().includes('gluten')?'at-g':a.toLowerCase().includes('lakt')?'at-l':a.toLowerCase().includes('nöt')?'at-n':a.toLowerCase().includes('vegan')?'at-v':'at-o';return`<span class="at ${c}">${a}</span>`}).join('');
  const adHtml=ads.map(a=>`<span class="addon-tag">${a.name} +${a.price}kr</span>`).join('');
  return`<div class="mc ${item.available===false?'off':''} ">
    <div class="mc-top"><span class="mc-emoji">${item.emoji||'🍽️'}</span><div class="mc-tgl ${item.available!==false?'on':''}" onclick="toggleAvail('${item.id}',${item.available!==false})"></div></div>
    <div class="mc-name">${item.name}</div>
    <div class="mc-desc">${item.description||''}</div>
    ${alHtml?`<div class="allergen-tags">${alHtml}</div>`:''}
    ${adHtml?`<div class="addon-tags">${adHtml}</div>`:''}
    <div class="mc-foot"><span class="mc-price">${item.price} kr</span><span class="mc-cat">${item.category||''}</span></div>
    <button class="btn-edit-mc" onclick="openItemModal('${item.id}')">✏ Redigera</button>
  </div>`;
}
function setFilter(cat){activeFilter=cat;renderMenyPage()}
async function toggleAvail(id,cur){await SB.from('menu_items').update({available:!cur}).eq('id',id);await loadMenu();renderMenyPage()}

function openItemModal(itemId){
  editItemId=itemId||null;
  document.getElementById('itemModalTitle').textContent=itemId?'Redigera rätt':'Ny rätt';
  document.getElementById('iDelBtn').style.display=itemId?'inline-block':'none';
  const catSel=document.getElementById('iCat');
  catSel.innerHTML=CATS.map(c=>`<option value="${c}">${c}</option>`).join('');
  document.querySelectorAll('.acb').forEach(l=>{l.classList.remove('checked');l.querySelector('input').checked=false});
  document.getElementById('addonRows').innerHTML='';
  if(itemId){
    const item=MENU.find(i=>String(i.id)===String(itemId));if(!item)return;
    document.getElementById('iName').value=item.name||'';
    document.getElementById('iDesc').value=item.description||'';
    document.getElementById('iPrice').value=item.price||'';
    document.getElementById('iEmoji').value=item.emoji||item.image_url||'';
    catSel.value=item.category||CATS[0]||'';
    (item.allergens||[]).forEach(a=>document.querySelectorAll('.acb').forEach(l=>{if(l.querySelector('input').value===a){l.classList.add('checked');l.querySelector('input').checked=true}}));
    (item.addons||[]).forEach(a=>addAddon(a.name,a.price));
  }else{['iName','iDesc','iPrice','iEmoji'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=''});}
  document.getElementById('itemModal').classList.add('open');
}
function closeItemModal(){document.getElementById('itemModal').classList.remove('open');editItemId=null}
function tgAl(el){el.classList.toggle('checked');el.querySelector('input').checked=el.classList.contains('checked')}
function addAddon(name='',price=''){
  const row=document.createElement('div');row.className='addon-row';
  row.innerHTML=`<input placeholder="Ex: Extra sås" value="${name}"><input class="ap" placeholder="+kr" type="number" value="${price}"><button class="btn-rm-addon" onclick="this.parentElement.remove()">✕</button>`;
  document.getElementById('addonRows').appendChild(row);
}
async function saveItem(){
  const name=document.getElementById('iName').value.trim();
  const desc=document.getElementById('iDesc').value.trim();
  const price=parseFloat(document.getElementById('iPrice').value);
  const emoji=document.getElementById('iEmoji').value.trim();
  const cat=document.getElementById('iCat').value;
  const allergens=[...document.querySelectorAll('.acb.checked')].map(l=>l.querySelector('input').value);
  const addonEls=document.querySelectorAll('#addonRows .addon-row');
  const addons=[...addonEls].map(r=>{const ins=r.querySelectorAll('input');return{name:ins[0].value.trim(),price:parseFloat(ins[1].value)||0}}).filter(a=>a.name);
  if(!name||!price){toast('❌ Namn och pris krävs');return}
  const payload={name,description:desc,price,emoji:emoji||'🍽️',image_url:emoji||null,category:cat,allergens,addons,available:true,restaurant_id:REST.id};
  if(editItemId){const {error}=await SB.from('menu_items').update(payload).eq('id',editItemId);if(error){toast('❌ '+error.message);return}}
  else{const {error}=await SB.from('menu_items').insert(payload);if(error){toast('❌ '+error.message);return}}
  toast('✅ Rätt sparad');closeItemModal();await loadMenu();renderMenyPage();
}
async function deleteItem(){
  if(!confirm('Ta bort?'))return;
  const {error}=await SB.from('menu_items').delete().eq('id',editItemId);
  if(error){toast('❌ '+error.message);return}
  toast('🗑️ Borttagen');closeItemModal();await loadMenu();renderMenyPage();
}

function openCatModal(){renderCatList();document.getElementById('catModal').classList.add('open')}
function renderCatList(){
  const el=document.getElementById('catListEl');
  el.innerHTML=CATS.map(c=>{const cnt=MENU.filter(i=>i.category===c).length;return`<div class="cat-item"><span class="cat-n">${c}</span><span class="cat-c">${cnt} rätter</span><button class="btn-sms" onclick="renameCat('${c}')">Byt namn</button><button class="btn-sms btn-sms-r" onclick="deleteCat('${c}')">✕</button></div>`}).join('')||'<div style="color:var(--text3);font-size:12px;font-family:var(--mono)">Inga kategorier</div>';
}
async function addCat(){
  const inp=document.getElementById('newCatInp');const name=inp.value.trim();if(!name)return;
  if(!CATS.includes(name)){await SB.from('menu_categories').insert({restaurant_id:REST.id,name,sort_order:CATS.length});CATS.push(name)}
  inp.value='';renderCatList();toast('✅ Kategori tillagd');
}
async function renameCat(old){const n=prompt('Nytt namn:',old);if(!n||n===old)return;await SB.from('menu_items').update({category:n}).eq('restaurant_id',REST.id).eq('category',old);await SB.from('menu_categories').update({name:n}).eq('restaurant_id',REST.id).eq('name',old);CATS=CATS.map(c=>c===old?n:c);await loadMenu();renderCatList();toast('✅ Omdöpt')}
async function deleteCat(name){if(!confirm(`Ta bort "${name}"?`))return;await SB.from('menu_categories').delete().eq('restaurant_id',REST.id).eq('name',name);CATS=CATS.filter(c=>c!==name);renderCatList();toast('🗑️ Borttagen')}

async function renderHistorikPage(){
  const {data}=await SB.from('orders').select('*').eq('restaurant_id',REST.id).eq('status','delivered').order('created_at',{ascending:false}).limit(100);
  const rows=(data||[]).map(o=>{
    const items=Array.isArray(o.items)?o.items:JSON.parse(o.items||'[]');
    const cnt=items.reduce((s,i)=>s+(i.quantity||1),0);
    const tip=items.map(i=>`${i.quantity||1}× ${i.name}`).join('<br>');
    const d=new Date(o.created_at);
    return`<tr><td style="color:var(--accent);font-family:var(--mono)">${o.id?.slice(0,10)}</td><td>${d.toLocaleDateString('sv-SE')}</td><td>${o.customer_name||'–'}</td><td style="cursor:pointer;color:var(--accent);font-family:var(--mono)" title="${tip}">${cnt}</td><td style="color:var(--green);font-family:var(--mono)">${o.total_amount||o.total||0} kr</td></tr>`;
  }).join('');
  document.getElementById('mainContent').innerHTML=`
    <div class="page active" style="padding:22px 26px">
      <div style="background:var(--card);border:1px solid var(--border);border-radius:2px;overflow-x:auto">
        <table class="hist-tbl"><thead><tr><th>Order-ID</th><th>Datum</th><th>Kund</th><th>Artiklar</th><th>Totalt</th></tr></thead>
        <tbody>${rows||'<tr><td colspan="5" style="text-align:center;color:var(--text3);padding:22px;font-family:var(--mono)">Inga levererade ordrar</td></tr>'}</tbody>
        </table>
      </div>
    </div>`;
}

async function renderStatistikPage(){
  const {data:all}=await SB.from('orders').select('*').eq('restaurant_id',REST.id).eq('status','delivered');
  const orders=all||[];const today=new Date().toDateString();
  const todayO=orders.filter(o=>new Date(o.created_at).toDateString()===today);
  const totalRev=orders.reduce((s,o)=>s+(o.total_amount||o.total||0),0);
  const todayRev=todayO.reduce((s,o)=>s+(o.total_amount||o.total||0),0);
  const ic={};orders.forEach(o=>(Array.isArray(o.items)?o.items:JSON.parse(o.items||'[]')).forEach(i=>{ic[i.name]=(ic[i.name]||0)+(i.quantity||1)}));
  const top=Object.entries(ic).sort((a,b)=>b[1]-a[1]).slice(0,5);
  document.getElementById('mainContent').innerHTML=`
    <div class="page active" style="padding:22px 26px">
      <div class="stat-grid">
        <div class="stat-card"><div class="sc-lbl">Idag</div><div class="sc-val c">${todayO.length}</div></div>
        <div class="stat-card"><div class="sc-lbl">Idag intäkter</div><div class="sc-val g">${todayRev} kr</div></div>
        <div class="stat-card"><div class="sc-lbl">Totalt ordrar</div><div class="sc-val">${orders.length}</div></div>
        <div class="stat-card"><div class="sc-lbl">Total omsättning</div><div class="sc-val o">${totalRev} kr</div></div>
      </div>
      <div style="background:var(--card);border:1px solid var(--border);border-radius:2px;padding:16px">
        <div style="font-size:10px;font-weight:700;color:var(--accent);font-family:var(--mono);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px">TOP RÄTTER</div>
        ${top.map(([n,c])=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)"><span>${n}</span><span style="color:var(--accent);font-family:var(--mono)">${c} beställda</span></div>`).join('')||'<div style="color:var(--text3);font-size:12px">Ingen data</div>'}
      </div>
    </div>`;
}

function renderKontoPage(){
  const r=REST;
  document.getElementById('mainContent').innerHTML=`
    <div class="page active" style="padding:22px 26px">
      <div style="font-size:11px;color:var(--text2);font-family:var(--mono);margin-bottom:18px">Restauranginformation och inställningar</div>
      <div class="konto-grid">
        <div class="k-sec">
          <div class="k-title">Kontaktuppgifter</div>
          <div class="k-fg"><label class="k-lbl">Restaurangnamn</label><input class="k-inp" id="kName" value="${r.name||''}"></div>
          <div class="k-fg"><label class="k-lbl">E-post</label><input class="k-inp" id="kEmail" value="${r.email||''}"></div>
          <div class="k-fg"><label class="k-lbl">Telefon</label><input class="k-inp" id="kPhone" value="${r.phone||''}"></div>
        </div>
        <div class="k-sec">
          <div class="k-title">Adress</div>
          <div class="k-fg"><label class="k-lbl">Gatuadress</label><input class="k-inp" id="kAddr" value="${r.address||''}"></div>
          <div class="k-fg"><label class="k-lbl">Postnummer</label><input class="k-inp" id="kZip" value="${r.zip||''}"></div>
          <div class="k-fg"><label class="k-lbl">Stad</label><input class="k-inp" id="kCity" value="${r.city||'Nyköping'}"></div>
        </div>
        <div class="k-sec full">
          <div class="k-title">Restauranginfo</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            <div class="k-fg"><label class="k-lbl">Öppettider</label><input class="k-inp" id="kHours" value="${r.opening_hours||'11:00 – 22:00'}"></div>
            <div class="k-fg"><label class="k-lbl">Kökstyp</label><input class="k-inp" id="kCuisine" value="${r.cuisine||''}"></div>
          </div>
          <div class="k-fg"><label class="k-lbl">Beskrivning</label><textarea class="k-inp k-ta" id="kDesc">${r.description||''}</textarea></div>
          <div style="display:flex;gap:9px;margin-top:4px">
            <button class="btn-save" onclick="saveKonto()">Spara ändringar</button>
            <button class="btn-danger" onclick="doLogout()">Logga ut</button>
          </div>
        </div>
      </div>
    </div>`;
}
async function saveKonto(){
  const p={name:document.getElementById('kName')?.value,email:document.getElementById('kEmail')?.value,phone:document.getElementById('kPhone')?.value,address:document.getElementById('kAddr')?.value,zip:document.getElementById('kZip')?.value,city:document.getElementById('kCity')?.value,opening_hours:document.getElementById('kHours')?.value,cuisine:document.getElementById('kCuisine')?.value,description:document.getElementById('kDesc')?.value};
  const {error}=await SB.from('restaurants').update(p).eq('id',REST.id);
  if(error){toast('❌ '+error.message);return}
  Object.assign(REST,p);document.getElementById('sbName').innerHTML=REST.name+'<span class="dot">.</span>';toast('✅ Konto sparat');
}

function toggleStatus(){
  isOpen=!isOpen;
  document.getElementById('sDot').classList.toggle('on',isOpen);
  document.getElementById('sTxt').textContent=isOpen?'Öppen':'Stängd';
  SB.from('restaurants').update({is_open:isOpen}).eq('id',REST.id);
  toast(isOpen?'✅ Restaurangen är öppen':'🔴 Restaurangen är stängd');
}

function openChat(orderId){
  chatOrderId=orderId;chatCh='customer';
  document.getElementById('chatOrdId').textContent=orderId?.slice(0,12);
  document.getElementById('chatDrawer').classList.add('open');
  document.querySelectorAll('.ch-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('cht-customer').classList.add('active');
  loadChatMsgs();
  if(chatSub)SB.removeChannel(chatSub);
  chatSub=SB.channel('rest-chat-'+orderId).on('postgres_changes',{event:'INSERT',schema:'public',table:'chats',filter:`order_id=eq.${orderId}`},()=>loadChatMsgs()).subscribe();
}
function closeChat(){document.getElementById('chatDrawer').classList.remove('open');if(chatSub)SB.removeChannel(chatSub)}
function switchCh(ch){
  chatCh=ch;document.querySelectorAll('.ch-tab').forEach(t=>t.classList.remove('active'));document.getElementById('cht-'+ch).classList.add('active');loadChatMsgs();
}
async function loadChatMsgs(){
  const {data}=await SB.from('chats').select('*').eq('order_id',chatOrderId).eq('channel',chatCh).order('created_at');
  const el=document.getElementById('chatMsgs');
  el.innerHTML=(data||[]).map(m=>`<div class="c-msg ${m.sender_role==='restaurant'?'me':'other'}"><div class="c-sender">${m.sender_name||m.sender_role}</div>${m.message}<div class="c-time">${new Date(m.created_at).toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'})}</div></div>`).join('')||'<div style="text-align:center;color:var(--text3);padding:18px;font-size:11px;font-family:var(--mono)">Inga meddelanden</div>';
  el.scrollTop=el.scrollHeight;
}
async function sendMsg(){
  const inp=document.getElementById('chatInput'),msg=inp.value.trim();if(!msg)return;inp.value='';
  await SB.from('chats').insert({order_id:chatOrderId,sender_role:'restaurant',sender_name:REST.name,message:msg,channel:chatCh});
}

function toast(m){const el=document.createElement('div');el.className='toast-el';el.textContent=m;document.body.appendChild(el);setTimeout(()=>el.remove(),3000)}

SB.auth.getSession().then(({data:{session}})=>{
  if(session){SB.from('restaurants').select('*').eq('auth_user_id',session.user.id).single().then(({data:r})=>{if(r){REST=r;loadApp()}})}
});
</script>
</body>
</html>
