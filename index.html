<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Atlas Delivery — Restaurang</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0A0A0F;--bg2:#0F0F1A;--bg3:#141428;
  --cyan:#00D4FF;--violet:#7B2FFF;--green:#00FF88;--red:#FF4560;--orange:#FF8C00;
  --text:#E8E8F0;--text2:#8888AA;
  --border:rgba(0,212,255,.13);--border2:rgba(123,47,255,.18);
  --glow-c:0 0 20px rgba(0,212,255,.3);
  --font:'Syne',sans-serif;--mono:'JetBrains Mono',monospace;
  --radius:12px;--radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:40px;width:380px;box-shadow:var(--glow-c)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo .l1{font-size:10px;color:var(--text2);letter-spacing:3px;font-family:var(--mono)}
.login-logo .l2{font-size:24px;font-weight:800;background:linear-gradient(90deg,var(--cyan),var(--violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-logo .l3{font-size:11px;color:var(--text2);letter-spacing:2px;font-family:var(--mono)}
.login-err{background:rgba(255,69,96,.1);border:1px solid rgba(255,69,96,.3);color:var(--red);padding:10px 14px;border-radius:var(--radius-sm);font-size:12px;margin-bottom:14px;display:none}
.lbl{font-size:10px;color:var(--text2);letter-spacing:1.5px;font-family:var(--mono);text-transform:uppercase;margin-bottom:6px;display:block}
.form-group{margin-bottom:14px}
.inp{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;color:var(--text);font-family:var(--mono);font-size:12px;width:100%;outline:none;transition:border .2s}
.inp:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,212,255,.08)}
.inp::placeholder{color:var(--text2)}
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 18px;border-radius:var(--radius-sm);font-family:var(--font);font-size:12px;font-weight:700;letter-spacing:.5px;cursor:pointer;transition:all .2s;border:none}
.btn-cyan{background:linear-gradient(135deg,var(--cyan),#0099BB);color:#000}.btn-cyan:hover{box-shadow:var(--glow-c)}
.btn-violet{background:linear-gradient(135deg,var(--violet),#5511CC);color:#fff}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2)}.btn-ghost:hover{border-color:var(--cyan);color:var(--cyan)}
.btn-sm{padding:5px 12px;font-size:11px}
.btn-red{background:rgba(255,69,96,.15);border:1px solid rgba(255,69,96,.3);color:var(--red)}
.btn-green{background:rgba(0,255,136,.15);border:1px solid rgba(0,255,136,.3);color:var(--green)}

/* APP */
#app{display:none}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar-left{display:flex;align-items:center;gap:14px}
.rest-name{font-size:18px;font-weight:800}
.rest-status{display:flex;align-items:center;gap:7px;font-size:11px;font-family:var(--mono)}
.rest-status .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green);animation:pulse 2s infinite}
.rest-status .dot.closed{background:var(--red);box-shadow:none;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.tabs{display:flex;gap:0;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin:20px 24px 0}
.tab{flex:1;padding:11px 0;text-align:center;font-size:12px;font-weight:700;letter-spacing:.5px;cursor:pointer;transition:all .2s;border:none;background:none;color:var(--text2);font-family:var(--font)}
.tab.active{background:rgba(0,212,255,.1);color:var(--cyan)}
.tab-content{display:none;padding:24px}
.tab-content.active{display:block}

/* ORDERS */
.order-cols{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.order-col-title{font-size:10px;color:var(--text2);letter-spacing:2px;font-family:var(--mono);text-transform:uppercase;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.order-col{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px}

.order-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:10px;transition:all .3s;animation:slideIn .3s ease;cursor:pointer;position:relative}
.order-card:hover{border-color:var(--cyan);box-shadow:0 0 15px rgba(0,212,255,.1)}
.order-card.new-order{border-color:var(--orange);animation:newPulse 1s ease-in-out 3}
@keyframes newPulse{0%,100%{box-shadow:none}50%{box-shadow:0 0 20px rgba(255,140,0,.4)}}
@keyframes slideIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}

.order-num{font-size:12px;font-weight:800;color:var(--cyan);font-family:var(--mono);margin-bottom:6px}
.order-customer{font-size:13px;font-weight:600;margin-bottom:4px}
.order-time{font-size:10px;color:var(--text);font-family:var(--mono)}
.order-addr{font-size:11px;color:var(--text2);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.order-total{font-size:14px;font-weight:700;color:var(--green);margin-top:8px}
.order-items{font-size:11px;color:var(--text2);margin-top:4px;line-height:1.6}
.order-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}

/* HOLOGRAM */
.holo-trigger{cursor:pointer}
.holo-trigger:hover::after{content:attr(data-holo);position:fixed;z-index:9999;background:linear-gradient(135deg,rgba(10,10,30,.98),rgba(15,15,40,.98));border:1px solid var(--cyan);border-radius:var(--radius);padding:16px 18px;font-size:11px;font-family:var(--mono);color:var(--text);white-space:pre;line-height:1.8;box-shadow:0 0 30px rgba(0,212,255,.25);max-width:300px;pointer-events:none;transform:translate(12px,-50%);top:var(--y,50%);left:var(--x,50%)}

/* BADGE */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:10px;font-family:var(--mono);font-weight:700;letter-spacing:.5px;text-transform:uppercase}

/* MENU */
.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.menu-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;transition:all .2s}
.menu-card:hover{border-color:var(--cyan)}
.menu-card-img{width:100%;height:100px;background:var(--bg2);border-radius:8px;margin-bottom:10px;object-fit:cover;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:28px}
.menu-card-name{font-size:14px;font-weight:700;margin-bottom:4px}
.menu-card-price{font-size:16px;font-weight:800;color:var(--cyan);font-family:var(--mono)}
.menu-card-desc{font-size:11px;color:var(--text2);margin:6px 0}
.menu-card-allergens{font-size:10px;color:var(--orange);font-family:var(--mono)}
.menu-card-actions{display:flex;gap:6px;margin-top:10px}

/* CHAT */
.chat-wrap{display:flex;flex-direction:column;height:400px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius)}
.chat-header{padding:14px 18px;border-bottom:1px solid var(--border);font-size:12px;font-weight:700;color:var(--cyan);font-family:var(--mono)}
.chat-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px}
.msg{max-width:80%;padding:8px 12px;border-radius:10px;font-size:12px;line-height:1.5}
.msg.mine{background:rgba(0,212,255,.15);border:1px solid rgba(0,212,255,.3);align-self:flex-end}
.msg.other{background:var(--bg3);border:1px solid var(--border);align-self:flex-start}
.msg-sender{font-size:9px;color:var(--text2);font-family:var(--mono);margin-bottom:3px;letter-spacing:1px;text-transform:uppercase}
.chat-footer{padding:10px 14px;border-top:1px solid var(--border);display:flex;gap:8px}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.stat-label{font-size:10px;color:var(--text2);letter-spacing:2px;font-family:var(--mono);text-transform:uppercase;margin-bottom:8px}
.stat-val{font-size:26px;font-weight:800;font-family:var(--mono);color:var(--cyan)}

/* NOTIF */
.notif{position:fixed;bottom:24px;right:24px;background:var(--bg2);border:1px solid var(--cyan);border-radius:var(--radius-sm);padding:12px 18px;font-family:var(--mono);font-size:12px;color:var(--cyan);box-shadow:var(--glow-c);transform:translateY(80px);opacity:0;transition:all .4s;z-index:9999}
.notif.show{transform:translateY(0);opacity:1}

::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(0,212,255,.2);border-radius:4px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="l1">ABKÄR-SE / ATLAS VALLEY</div>
      <div class="l2">Atlas Delivery</div>
      <div class="l3">RESTAURANGPANEL</div>
    </div>
    <div class="login-err" id="login-err"></div>
    <div class="form-group">
      <label class="lbl">E-postadress</label>
      <input class="inp" id="login-email" type="email" placeholder="restaurant@atlasdel.se"/>
    </div>
    <div class="form-group">
      <label class="lbl">Lösenord</label>
      <input class="inp" id="login-pass" type="password" placeholder="••••••••"/>
    </div>
    <button class="btn btn-cyan" style="width:100%;justify-content:center;padding:12px" onclick="doLogin()">Logga in</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <div>
        <div class="rest-name" id="rest-name-title">–</div>
        <div style="font-size:11px;color:var(--text2);font-family:var(--mono)" id="rest-phone-title"></div>
      </div>
      <div class="rest-status">
        <div class="dot" id="status-dot"></div>
        <span id="status-text">ÖPPEN</span>
      </div>
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <button class="btn btn-ghost btn-sm" id="toggle-open-btn" onclick="toggleOpen()">Stäng restaurangen</button>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">Logga ut</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('orders')">📋 Ordrar</button>
    <button class="tab" onclick="switchTab('menu')">🗂️ Meny</button>
    <button class="tab" onclick="switchTab('chat')">💬 Chat <span id="chat-badge" style="display:none;background:var(--red);color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;margin-left:4px">!</span></button>
    <button class="tab" onclick="switchTab('stats')">📈 Statistik</button>
  </div>

  <!-- ORDERS TAB -->
  <div class="tab-content active" id="tab-orders">
    <div class="order-cols">
      <div class="order-col">
        <div class="order-col-title">🔴 Nya</div>
        <div id="col-new"></div>
      </div>
      <div class="order-col">
        <div class="order-col-title">🔵 Tillagas</div>
        <div id="col-preparing"></div>
      </div>
      <div class="order-col">
        <div class="order-col-title">🟣 Klar</div>
        <div id="col-ready"></div>
      </div>
      <div class="order-col">
        <div class="order-col-title">✅ Hämtade</div>
        <div id="col-done"></div>
      </div>
    </div>
  </div>

  <!-- MENU TAB -->
  <div class="tab-content" id="tab-menu">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <div style="font-size:14px;font-weight:700">Vår meny</div>
      <button class="btn btn-cyan btn-sm" onclick="openAddItem()">+ Lägg till rätt</button>
    </div>
    <div class="menu-grid" id="menu-grid"></div>
  </div>

  <!-- CHAT TAB -->
  <div class="tab-content" id="tab-chat">
    <div style="display:grid;grid-template-columns:240px 1fr;gap:16px;height:500px">
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow-y:auto">
        <div style="padding:14px 16px;border-bottom:1px solid var(--border);font-size:11px;color:var(--text2);font-family:var(--mono);letter-spacing:1px;text-transform:uppercase">Ordrar</div>
        <div id="chat-order-list"></div>
      </div>
      <div class="chat-wrap" id="chat-main">
        <div class="chat-header">Välj en order för att chatta</div>
        <div class="chat-msgs" id="chat-msgs"><div style="color:var(--text2);font-size:12px;text-align:center;padding:40px;font-family:var(--mono)">Välj en order till vänster</div></div>
        <div class="chat-footer">
          <input class="inp" id="chat-inp" placeholder="Skriv meddelande..." style="flex:1"/>
          <button class="btn btn-cyan btn-sm" onclick="sendMsg()">Skicka</button>
        </div>
      </div>
    </div>
  </div>

  <!-- STATS TAB -->
  <div class="tab-content" id="tab-stats">
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Ordrar idag</div><div class="stat-val" id="st-today">–</div></div>
      <div class="stat-card"><div class="stat-label">Totala ordrar</div><div class="stat-val" id="st-total">–</div></div>
      <div class="stat-card"><div class="stat-label">Matomsättning idag</div><div class="stat-val" id="st-rev">–</div></div>
    </div>
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
      <div style="padding:14px 18px;border-bottom:1px solid var(--border);font-size:11px;color:var(--cyan);font-family:var(--mono);letter-spacing:1.5px;text-transform:uppercase">Senaste 20 ordrar</div>
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:12px" id="hist-table">
          <thead><tr>
            <th style="padding:8px 14px;text-align:left;color:var(--text2);font-family:var(--mono);font-size:10px;letter-spacing:1.5px;border-bottom:1px solid var(--border)">#</th>
            <th style="padding:8px 14px;text-align:left;color:var(--text2);font-family:var(--mono);font-size:10px;letter-spacing:1.5px;border-bottom:1px solid var(--border)">Kund</th>
            <th style="padding:8px 14px;text-align:left;color:var(--text2);font-family:var(--mono);font-size:10px;letter-spacing:1.5px;border-bottom:1px solid var(--border)">Telefon</th>
            <th style="padding:8px 14px;text-align:left;color:var(--text2);font-family:var(--mono);font-size:10px;letter-spacing:1.5px;border-bottom:1px solid var(--border)">Mat</th>
            <th style="padding:8px 14px;text-align:left;color:var(--text2);font-family:var(--mono);font-size:10px;letter-spacing:1.5px;border-bottom:1px solid var(--border)">Status</th>
            <th style="padding:8px 14px;text-align:left;color:var(--text2);font-family:var(--mono);font-size:10px;letter-spacing:1.5px;border-bottom:1px solid var(--border)">Tid</th>
          </tr></thead>
          <tbody id="hist-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="notif" id="notif"></div>

<script>
const SB = supabase.createClient(
  'https://vgtdswplzuhbhhlmxrgg.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZndGRzd3BsenVoYmhobG14cmdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMTY2ODIsImV4cCI6MjA4ODU5MjY4Mn0.82sk-40cQo7NxeRWUgthTzp_fk1TlBcqPchrBGGIFnU'
);

let currentUser = null, myRestaurant = null, allOrders = [], currentChatOrderId = null;

// ── LOGIN ──
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  const err = document.getElementById('login-err');
  err.style.display = 'none';
  const { data, error } = await SB.auth.signInWithPassword({ email, password: pass });
  if (error) { err.textContent = error.message; err.style.display = 'block'; return; }
  const { data: prof } = await SB.from('profiles').select('role').eq('id', data.user.id).single();
  if (!prof || (prof.role !== 'restaurant' && prof.role !== 'admin')) {
    await SB.auth.signOut();
    err.textContent = 'Åtkomst nekad — inte ett restaurangkonto.';
    err.style.display = 'block';
    return;
  }
  currentUser = data.user;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  init();
}
async function doLogout() { await SB.auth.signOut(); location.reload(); }
document.getElementById('login-pass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

async function init() {
  // Find restaurant owned by this user
  const { data: rest } = await SB.from('restaurants').select('*').eq('owner_id', currentUser.id).single();
  if (!rest) {
    // Fallback: assign first restaurant for demo
    const { data: anyRest } = await SB.from('restaurants').select('*').limit(1).single();
    myRestaurant = anyRest;
  } else {
    myRestaurant = rest;
  }
  updateRestaurantUI();
  await loadOrders();
  await loadMenu();
  updateStats();
  populateChatOrderList();
  subscribeRealtime();
}

function updateRestaurantUI() {
  if (!myRestaurant) return;
  document.getElementById('rest-name-title').textContent = myRestaurant.name;
  document.getElementById('rest-phone-title').textContent = myRestaurant.phone || '';
  const isOpen = myRestaurant.is_open;
  document.getElementById('status-dot').className = 'dot' + (isOpen ? '' : ' closed');
  document.getElementById('status-text').textContent = isOpen ? 'ÖPPEN' : 'STÄNGD';
  document.getElementById('toggle-open-btn').textContent = isOpen ? 'Stäng restaurangen' : 'Öppna restaurangen';
}

async function toggleOpen() {
  if (!myRestaurant) return;
  const newVal = !myRestaurant.is_open;
  await SB.from('restaurants').update({ is_open: newVal }).eq('id', myRestaurant.id);
  myRestaurant.is_open = newVal;
  updateRestaurantUI();
  notify(newVal ? '✓ Restaurangen är nu öppen' : 'Restaurangen är stängd');
}

// ── ORDERS ──
async function loadOrders() {
  if (!myRestaurant) return;
  const { data } = await SB.from('orders').select('*')
    .eq('restaurant_id', myRestaurant.id)
    .not('status', 'eq', 'delivered')
    .order('created_at', { ascending: false });
  allOrders = data || [];
  renderOrders();
}

async function loadHistory() {
  if (!myRestaurant) return;
  const { data } = await SB.from('orders').select('*').eq('restaurant_id', myRestaurant.id).order('created_at', { ascending: false }).limit(20);
  return data || [];
}

function renderOrders() {
  ['new','preparing','ready'].forEach(st => {
    const col = document.getElementById('col-'+st);
    if (!col) return;
    const filtered = allOrders.filter(o => o.status === st);
    col.innerHTML = filtered.length === 0
      ? `<div style="color:var(--text2);font-size:11px;font-family:var(--mono);text-align:center;padding:20px">Inga ordrar</div>`
      : filtered.map(o => buildOrderCard(o)).join('');
  });
  // Done column: picked + delivered
  const done = allOrders.filter(o => o.status === 'picked' || o.status === 'delivered');
  document.getElementById('col-done').innerHTML = done.length === 0
    ? `<div style="color:var(--text2);font-size:11px;font-family:var(--mono);text-align:center;padding:20px">Inga</div>`
    : done.map(o => buildOrderCard(o)).join('');
}

function buildOrderCard(o) {
  const ts = o.created_at ? new Date(o.created_at).toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'}) : '–';
  const items = o.items ? (Array.isArray(o.items) ? o.items.map(i=>`${i.name} ×${i.qty||1}`).join(', ') : JSON.stringify(o.items)) : '–';
  const holo = [
    `ORDER      ${o.order_number||o.id?.slice(0,8)||'–'}`,
    `────────────────────────────────`,
    `Kund       ${o.customer_name||'–'}`,
    `Telefon    ${o.customer_phone||'–'}`,
    `Adress     ${o.customer_address||o.delivery_address||'–'}`,
    `────────────────────────────────`,
    `Mat        ${o.subtotal||0} kr`,
    `Leverans   ${o.delivery_fee||0} kr`,
    `Dricks     ${o.tip||0} kr`,
    `TOTALT     ${o.total||0} kr`,
    `────────────────────────────────`,
    `Tid        ${ts}`,
    `Bud        ${o.rider_name||'Ej tilldelad'}`
  ].join('\n');

  const nextStatus = {new:'preparing',preparing:'ready'}[o.status];
  const nextLabel = {new:'Börja tillaga',preparing:'Markera klar'}[o.status];
  const isActive = o.status !== 'picked' && o.status !== 'delivered';

  return `<div class="order-card ${o.status==='new'?'new-order':''} holo-trigger" data-holo="${escHolo(holo)}" onmousemove="setHoloPos(event)">
    <div class="order-num">#${o.order_number||o.id?.slice(0,8)||'–'}</div>
    <div class="order-customer">${o.customer_name||'–'}</div>
    <div class="order-time">${ts}</div>
    <div class="order-addr">${o.customer_address||o.delivery_address||'–'}</div>
    <div class="order-items">${items}</div>
    <div class="order-total">${(o.total||0).toFixed(0)} kr</div>
    ${isActive && nextStatus ? `<div class="order-actions">
      <button class="btn btn-cyan btn-sm" onclick="advanceOrder('${o.id}','${nextStatus}')">→ ${nextLabel}</button>
      <button class="btn btn-ghost btn-sm" onclick="openChat('${o.id}','${o.order_number||o.id?.slice(0,8)||''}')">💬</button>
    </div>` : `<div class="order-actions"><button class="btn btn-ghost btn-sm" onclick="openChat('${o.id}','${o.order_number||o.id?.slice(0,8)||''}')">💬</button></div>`}
  </div>`;
}

async function advanceOrder(id, newStatus) {
  await SB.from('orders').update({ status: newStatus }).eq('id', id);
  await loadOrders();
  notify('Order uppdaterad → ' + {preparing:'Tillagas',ready:'Klar'}[newStatus]);
}

// ── MENU ──
async function loadMenu() {
  if (!myRestaurant) return;
  const { data } = await SB.from('menu_items').select('*').eq('restaurant_id', myRestaurant.id).order('category').order('name');
  const grid = document.getElementById('menu-grid');
  grid.innerHTML = (data||[]).map(item => `
    <div class="menu-card">
      <div class="menu-card-img">${item.image_url ? `<img src="${item.image_url}" style="width:100%;height:100%;object-fit:cover;border-radius:8px"/>` : '🍽️'}</div>
      <div class="menu-card-name">${item.name}</div>
      <div class="menu-card-price">${item.price||0} kr</div>
      ${item.category ? `<div style="font-size:10px;color:var(--text2);font-family:var(--mono);margin-top:2px">${item.category}</div>` : ''}
      ${item.description ? `<div class="menu-card-desc">${item.description}</div>` : ''}
      ${item.allergens ? `<div class="menu-card-allergens">⚠ ${item.allergens}</div>` : ''}
      <div class="menu-card-actions">
        <span style="display:inline-block;padding:3px 8px;border-radius:12px;font-size:10px;font-family:var(--mono);background:${item.available?'rgba(0,255,136,.1)':'rgba(255,255,255,.05)'};color:${item.available?'var(--green)':'var(--text2)'};border:1px solid ${item.available?'rgba(0,255,136,.3)':'rgba(255,255,255,.1)'}">${item.available?'Tillgänglig':'Otillgänglig'}</span>
        <button class="btn btn-ghost btn-sm" onclick="editItem('${item.id}','${escAttr(item.name)}',${item.price},'${escAttr(item.category||'')}','${escAttr(item.description||'')}','${escAttr(item.allergens||'')}')">✏</button>
        <button class="btn btn-ghost btn-sm" onclick="toggleItem('${item.id}',${!item.available})">${item.available?'Av':'På'}</button>
      </div>
    </div>`).join('') || '<div style="color:var(--text2);font-size:12px;font-family:var(--mono)">Inga rätter ännu. Lägg till din första rätt!</div>';
}

async function toggleItem(id, available) {
  await SB.from('menu_items').update({ available }).eq('id', id);
  loadMenu();
}

async function editItem(id, name, price, cat, desc, allergens) {
  const newName = prompt('Namn:', name); if (!newName) return;
  const newPrice = prompt('Pris (kr):', price);
  const newCat = prompt('Kategori:', cat);
  const newDesc = prompt('Beskrivning:', desc);
  const newAll = prompt('Allergener:', allergens);
  await SB.from('menu_items').update({ name:newName, price:parseFloat(newPrice)||0, category:newCat, description:newDesc, allergens:newAll }).eq('id', id);
  loadMenu();
  notify('✓ Rätt uppdaterad');
}

function openAddItem() {
  if (!myRestaurant) return;
  const name = prompt('Namn på rätt:'); if (!name) return;
  const price = prompt('Pris (kr):');
  const cat = prompt('Kategori (t.ex. Förrätt, Huvudrätt, Dessert):') || 'Main';
  const desc = prompt('Beskrivning (valfritt):') || '';
  const allergens = prompt('Allergener (valfritt):') || '';
  SB.from('menu_items').insert({ restaurant_id: myRestaurant.id, name, price: parseFloat(price)||0, category:cat, description:desc, allergens, available:true })
    .then(() => { loadMenu(); notify('✓ Rätt tillagd: '+name); });
}

// ── CHAT ──
function populateChatOrderList() {
  const list = document.getElementById('chat-order-list');
  if (!list) return;
  list.innerHTML = allOrders.slice(0,15).map(o => `
    <div onclick="openChat('${o.id}','${o.order_number||o.id?.slice(0,8)||''}')" style="padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;font-size:12px;transition:background .15s;${currentChatOrderId===o.id?'background:rgba(0,212,255,.08);color:var(--cyan)':''}" onmouseover="this.style.background='rgba(0,212,255,.05)'" onmouseout="this.style.background='${currentChatOrderId===o.id?'rgba(0,212,255,.08)':'transparent'}'">
      <div style="font-weight:700;font-family:var(--mono)">#${o.order_number||o.id?.slice(0,8)||'–'}</div>
      <div style="color:var(--text2);font-size:11px">${o.customer_name||'–'}</div>
    </div>`).join('');
}

async function openChat(orderId, orderNum) {
  currentChatOrderId = orderId;
  switchTab('chat');
  document.querySelector('.chat-wrap .chat-header').textContent = 'Chat — Order #' + orderNum;
  const { data } = await SB.from('chats').select('*').eq('order_id', orderId).order('created_at');
  renderChatMsgs(data || []);
  SB.channel('chat-rest-'+orderId)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'chats',filter:'order_id=eq.'+orderId}, async () => {
      const {data:msgs} = await SB.from('chats').select('*').eq('order_id',orderId).order('created_at');
      renderChatMsgs(msgs||[]);
    }).subscribe();
  populateChatOrderList();
}

function renderChatMsgs(msgs) {
  const el = document.getElementById('chat-msgs');
  el.innerHTML = msgs.length === 0
    ? '<div style="color:var(--text2);font-size:12px;text-align:center;padding:30px;font-family:var(--mono)">Inga meddelanden ännu.</div>'
    : msgs.map(m => `<div class="msg ${m.sender_role==='restaurant'?'mine':'other'}"><div class="msg-sender">${m.sender_name||m.sender_role} · ${new Date(m.created_at).toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'})}</div>${m.message}</div>`).join('');
  el.scrollTop = el.scrollHeight;
}

async function sendMsg() {
  if (!currentChatOrderId) return;
  const inp = document.getElementById('chat-inp');
  const msg = inp.value.trim(); if (!msg) return;
  inp.value = '';
  await SB.from('chats').insert({ order_id: currentChatOrderId, sender_role:'restaurant', sender_name: myRestaurant?.name||'Restaurang', message:msg, sender_id:currentUser?.id });
}

// ── STATS ──
async function updateStats() {
  const today = new Date().toISOString().slice(0,10);
  const hist = await loadHistory();
  const todayOrders = hist.filter(o=>o.created_at?.startsWith(today));
  document.getElementById('st-today').textContent = todayOrders.length;
  document.getElementById('st-total').textContent = hist.length;
  document.getElementById('st-rev').textContent = todayOrders.reduce((s,o)=>s+(o.subtotal||0),0).toFixed(0)+' kr';
  const tbody = document.getElementById('hist-body');
  tbody.innerHTML = hist.map(o => `
    <tr style="border-bottom:1px solid rgba(255,255,255,.04)">
      <td style="padding:8px 14px;font-family:var(--mono);color:var(--cyan);font-size:11px">${o.order_number||o.id?.slice(0,8)||'–'}</td>
      <td style="padding:8px 14px">${o.customer_name||'–'}</td>
      <td style="padding:8px 14px;font-family:var(--mono);font-size:11px">${o.customer_phone||'–'}</td>
      <td style="padding:8px 14px;font-family:var(--mono)">${(o.subtotal||0).toFixed(0)} kr</td>
      <td style="padding:8px 14px"><span style="font-size:10px;font-family:var(--mono)">${o.status||'–'}</span></td>
      <td style="padding:8px 14px;font-family:var(--mono);font-size:10px">${o.created_at?.slice(11,16)||'–'}</td>
    </tr>`).join('');
}

// ── REALTIME ──
function subscribeRealtime() {
  if (!myRestaurant) return;
  SB.channel('rest-live')
    .on('postgres_changes',{event:'*',schema:'public',table:'orders',filter:`restaurant_id=eq.${myRestaurant.id}`}, async (payload) => {
      await loadOrders();
      updateStats();
      populateChatOrderList();
      if (payload.eventType === 'INSERT') {
        notify('🔔 Ny beställning! #'+(payload.new.order_number||''));
        playAlert();
      }
    }).subscribe();
}

function playAlert() {
  try {
    const ctx = new AudioContext();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(880,ctx.currentTime);
    osc.frequency.setValueAtTime(1100,ctx.currentTime+.1);
    gain.gain.setValueAtTime(.3,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.4);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime+.4);
  } catch(e){}
}

// ── UTILS ──
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i)=>{t.classList.remove('active');if(['orders','menu','chat','stats'][i]===name)t.classList.add('active')});
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if (name==='stats') updateStats();
}
function setHoloPos(e){e.currentTarget.style.setProperty('--x',e.clientX+'px');e.currentTarget.style.setProperty('--y',e.clientY+'px')}
function escHolo(s){return s.replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function escAttr(s){return (s||'').replace(/'/g,'&#39;')}
function notify(msg){const el=document.getElementById('notif');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),3200)}

// ── AUTH CHECK ──
(async()=>{
  const {data}=await SB.auth.getSession();
  if(data.session){
    const{data:prof}=await SB.from('profiles').select('role').eq('id',data.session.user.id).single();
    if(prof?.role==='restaurant'||prof?.role==='admin'){
      currentUser=data.session.user;
      document.getElementById('login-screen').style.display='none';
      document.getElementById('app').style.display='block';
      init();
    }
  }
})();
</script>
