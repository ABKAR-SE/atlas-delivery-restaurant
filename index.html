<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas Delivery — Restaurant</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍽️</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#07070E;--s1:#0F0F1A;--s2:#161625;--s3:#1C1C2E;--border:rgba(0,212,255,.10);--cyan:#00D4FF;--violet:#7B2FFF;--orange:#FF6B35;--green:#00FF88;--red:#FF3B3B;--yellow:#FFB800;--text:#E8E8F0;--muted:#5A5A78;--fd:'Syne',sans-serif;--fb:'DM Sans',sans-serif;--fm:'JetBrains Mono',monospace;--grad:linear-gradient(135deg,#00D4FF,#7B2FFF);--tr:200ms cubic-bezier(.4,0,.2,1)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--fb);-webkit-font-smoothing:antialiased;display:flex;min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(0,212,255,.18);border-radius:4px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slidein{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes ring{0%,100%{transform:rotate(0)}15%{transform:rotate(-12deg)}30%{transform:rotate(12deg)}45%{transform:rotate(-8deg)}60%{transform:rotate(8deg)}}

/* ── SIDEBAR ── */
.sidebar{width:230px;flex-shrink:0;background:var(--s1);border-right:1px solid var(--border);position:fixed;top:0;bottom:0;left:0;z-index:50;display:flex;flex-direction:column}
.sb-logo{padding:22px 18px 16px;border-bottom:1px solid var(--border)}
.sb-logo-tag{font-family:var(--fm);font-size:9px;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;margin-bottom:4px}
.sb-logo-main{font-family:var(--fd);font-size:15px;font-weight:700;color:var(--cyan)}
.sb-rest{padding:14px 18px;border-bottom:1px solid var(--border)}
.sb-rest-row{display:flex;align-items:center;gap:8px}
.sb-rest-name{font-size:13px;font-weight:600;line-height:1.2}
.sb-rest-status{font-family:var(--fm);font-size:9px;letter-spacing:.06em;margin-top:2px}
.od{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.od.on{background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
.od.off{background:var(--muted)}
.sb-sel{margin-top:10px}
.sb-sel select{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:7px;padding:7px 10px;color:var(--text);font-family:var(--fm);font-size:11px;outline:none;cursor:pointer}
.sb-nav{flex:1;padding:8px 0;overflow-y:auto}
.sb-item{display:flex;align-items:center;gap:9px;padding:9px 18px;cursor:pointer;font-size:13px;color:var(--muted);transition:all .15s;border:none;background:none;width:100%;text-align:left;position:relative}
.sb-item:hover{color:var(--text);background:rgba(255,255,255,.025)}
.sb-item.active{color:var(--cyan);background:rgba(0,212,255,.05)}
.sb-item.active::before{content:'';position:absolute;left:0;top:5px;bottom:5px;width:2px;background:var(--cyan);border-radius:0 2px 2px 0}
.sb-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.sb-badge{margin-left:auto;background:var(--orange);color:var(--bg);font-family:var(--fm);font-size:9px;font-weight:700;padding:2px 7px;border-radius:100px;min-width:18px;text-align:center}
.sb-bottom{padding:14px 18px;border-top:1px solid var(--border)}
.toggle-row{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--muted)}
.pill{width:44px;height:24px;border-radius:100px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;border:none}
.pill.on{background:var(--green)}.pill.off{background:var(--s3)}
.pill::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;background:white;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.4)}
.pill.on::after{transform:translateX(20px)}

/* ── MAIN ── */
.main{margin-left:230px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{height:56px;padding:0 24px;background:rgba(5,5,12,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40}
.tb-title{font-family:var(--fd);font-size:16px;font-weight:700}
.tb-right{display:flex;align-items:center;gap:12px}
.clock{font-family:var(--fm);font-size:12px;color:var(--muted)}
.sync-chip{display:flex;align-items:center;gap:6px;font-family:var(--fm);font-size:10px;color:var(--muted);letter-spacing:.06em}
.sim-btn{background:rgba(255,107,53,.1);border:1px solid rgba(255,107,53,.25);color:var(--orange);font-family:var(--fm);font-size:11px;padding:6px 14px;border-radius:8px;cursor:pointer;letter-spacing:.04em;transition:all .2s}
.sim-btn:hover{background:rgba(255,107,53,.2)}
.content{padding:22px;flex:1}

/* ── STATS ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:20px}
.sc{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:15px;position:relative;overflow:hidden;transition:border-color .2s}
.sc:hover{border-color:rgba(0,212,255,.2)}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--grad);opacity:.7}
.sc-label{font-family:var(--fm);font-size:9px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:7px}
.sc-val{font-family:var(--fd);font-size:26px;font-weight:800;line-height:1}
.sc-sub{font-family:var(--fm);font-size:10px;margin-top:5px}

/* ── TWO COL ── */
.two-col{display:grid;grid-template-columns:1fr 300px;gap:16px}
.panel{background:var(--s1);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.ph{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.ph-title{font-family:var(--fd);font-size:14px;font-weight:700}
.ph-btn{font-family:var(--fm);font-size:11px;color:var(--cyan);border:none;background:none;cursor:pointer;padding:0}

/* ── ORDER ROWS ── */
.orow{padding:13px 18px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:background .15s;position:relative}
.orow:hover{background:rgba(255,255,255,.02)}
.orow.selected{background:rgba(0,212,255,.04);border-left:2px solid var(--cyan)}
.orow.new-flash{animation:newflash .6s ease}
@keyframes newflash{0%{background:rgba(0,212,255,.15)}100%{background:transparent}}
.orow-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.oid{font-family:var(--fm);font-size:11px;color:var(--cyan);letter-spacing:.06em}
.ocust{font-size:13px;font-weight:500}
.oprev{font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:260px}
.orow-bot{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.otime{font-family:var(--fm);font-size:10px;color:var(--muted)}
.ototal{font-family:var(--fm);font-size:12px}
.oacts{display:flex;gap:6px;margin-top:8px}
.abtn{font-family:var(--fm);font-size:10px;letter-spacing:.04em;padding:5px 12px;border-radius:7px;cursor:pointer;border:none;transition:all .15s}
.accept{background:rgba(0,255,136,.1);color:var(--green);border:1px solid rgba(0,255,136,.2)}.accept:hover{background:rgba(0,255,136,.2)}
.reject{background:rgba(255,59,59,.1);color:var(--red);border:1px solid rgba(255,59,59,.2)}.reject:hover{background:rgba(255,59,59,.2)}
.readybtn{background:rgba(0,212,255,.1);color:var(--cyan);border:1px solid rgba(0,212,255,.2)}.readybtn:hover{background:rgba(0,212,255,.2)}
.no-orders{padding:48px;text-align:center;color:var(--muted);font-family:var(--fm);font-size:12px;letter-spacing:.06em}

/* ── DETAIL ── */
.detail-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:240px;color:var(--muted);gap:8px;font-family:var(--fm);font-size:11px;letter-spacing:.06em}
.ds{padding:13px 18px;border-bottom:1px solid rgba(255,255,255,.04)}
.ds:last-child{border-bottom:none}
.ds-title{font-family:var(--fm);font-size:9px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px}
.ds-row{display:flex;justify-content:space-between;font-size:12px;padding:2px 0}
.ds-muted{color:var(--muted);font-size:11px;font-family:var(--fm)}

/* ── MENU ── */
.mrow{display:flex;align-items:center;justify-content:space-between;padding:11px 18px;border-bottom:1px solid rgba(255,255,255,.04)}
.mrow:last-child{border-bottom:none}
.mrow-name{font-size:13px;font-weight:500}
.mrow-meta{font-family:var(--fm);font-size:10px;color:var(--muted);margin-top:2px}
.itoggle{width:36px;height:20px;border-radius:100px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;border:none}
.itoggle.on{background:var(--green)}.itoggle.off{background:var(--s3)}
.itoggle::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;background:white;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.itoggle.on::after{transform:translateX(16px)}

/* ── CHARTS ── */
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.bar-lbl{font-family:var(--fm);font-size:10px;color:var(--muted);width:28px;text-align:right;flex-shrink:0}
.bar-track{flex:1;height:8px;background:var(--s2);border-radius:100px;overflow:hidden}
.bar-fill{height:100%;border-radius:100px;background:var(--grad);transition:width 1s}
.bar-num{font-family:var(--fm);font-size:10px;color:var(--muted);width:50px;text-align:right;flex-shrink:0}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;font-family:var(--fm);font-size:10px;font-weight:600;letter-spacing:.07em;padding:3px 10px;border-radius:100px}
.b-new{background:rgba(0,212,255,.12);color:var(--cyan);border:1px solid rgba(0,212,255,.3)}
.b-accepted{background:rgba(255,184,0,.12);color:var(--yellow);border:1px solid rgba(255,184,0,.3)}
.b-preparing{background:rgba(255,107,53,.12);color:var(--orange);border:1px solid rgba(255,107,53,.3)}
.b-ready{background:rgba(0,255,136,.12);color:var(--green);border:1px solid rgba(0,255,136,.3)}
.b-picked{background:rgba(123,47,255,.12);color:#B080FF;border:1px solid rgba(123,47,255,.3)}
.b-delivered{background:rgba(0,255,136,.08);color:var(--green);border:1px solid rgba(0,255,136,.2)}
.b-cancelled{background:rgba(255,59,59,.12);color:var(--red);border:1px solid rgba(255,59,59,.3)}

/* ── NOTIF ── */
.notif{position:fixed;top:66px;right:18px;z-index:300;background:var(--s1);border:1px solid rgba(0,212,255,.3);border-radius:13px;padding:13px 16px;display:flex;align-items:center;gap:10px;transform:translateX(340px);transition:transform .4s cubic-bezier(.34,1.56,.64,1);max-width:290px;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.notif.show{transform:translateX(0)}
.notif-dot{width:7px;height:7px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan);flex-shrink:0;animation:pulse 1.5s infinite}
.notif-body{flex:1}.notif-tag{font-family:var(--fm);font-size:9px;color:var(--cyan);letter-spacing:.1em;margin-bottom:2px}
.notif-msg{font-size:12px;line-height:1.4}

/* ── AUTH ── */
.auth-wall{position:fixed;inset:0;background:var(--bg);z-index:400;display:flex;align-items:center;justify-content:center;padding:20px}
.auth-box{background:var(--s1);border:1px solid var(--border);border-radius:20px;width:100%;max-width:420px;padding:32px}
.auth-logo{font-family:var(--fm);font-size:10px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin-bottom:5px}
.auth-title{font-family:var(--fd);font-size:26px;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.auth-sub{font-size:13px;color:var(--muted);margin-bottom:22px;line-height:1.6}
.auth-form{display:flex;flex-direction:column;gap:14px}
.afield label{font-family:var(--fm);font-size:10px;color:var(--muted);letter-spacing:.09em;text-transform:uppercase;display:block;margin-bottom:5px}
.ainput{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:9px;padding:11px 14px;color:var(--text);font-family:var(--fb);font-size:14px;outline:none;transition:border-color .2s}
.ainput:focus{border-color:rgba(0,212,255,.4)}.ainput::placeholder{color:var(--muted)}
.aprimary{background:var(--grad);color:var(--bg);font-family:var(--fm);font-weight:600;font-size:13px;letter-spacing:.06em;padding:13px;border-radius:9px;border:none;cursor:pointer;transition:opacity .2s;width:100%}
.aprimary:hover{opacity:.85}.aprimary:disabled{opacity:.4;cursor:not-allowed}
.aerr{background:rgba(255,59,59,.1);border:1px solid rgba(255,59,59,.25);border-radius:8px;padding:9px 13px;font-size:12px;color:var(--red);display:none;margin-bottom:4px}
.aerr.show{display:block}
.auth-skip{font-family:var(--fm);font-size:10px;color:var(--muted);text-align:center;margin-top:14px;cursor:pointer;letter-spacing:.06em}
.auth-skip:hover{color:var(--cyan)}

/* TOAST */
.toast{position:fixed;bottom:22px;right:22px;z-index:9999;background:var(--s1);border:1px solid rgba(0,255,136,.3);border-radius:9px;padding:11px 18px;display:flex;align-items:center;gap:9px;font-size:13px;font-family:var(--fm);transform:translateY(80px);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;max-width:310px}
.toast.show{transform:translateY(0);opacity:1}.toast-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);flex-shrink:0}
.toast--err{border-color:rgba(255,59,59,.3)}.toast--err .toast-dot{background:var(--red);box-shadow:0 0 8px var(--red)}
.toast--info{border-color:rgba(0,212,255,.3)}.toast--info .toast-dot{background:var(--cyan);box-shadow:0 0 8px var(--cyan)}

@media(max-width:900px){.two-col{grid-template-columns:1fr}}
@media(max-width:700px){.sidebar{display:none}.main{margin-left:0}.stats-row{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<!-- AUTH WALL -->
<div class="auth-wall" id="authWall">
  <div class="auth-box">
    <div class="auth-logo">Atlas Delivery</div>
    <div class="auth-title">Restaurant Panel</div>
    <div class="auth-sub">Logga in med ditt restaurangkonto för att hantera beställningar och meny i realtid.</div>
    <div class="aerr" id="aerr"></div>
    <div class="auth-form">
      <div class="afield"><label>E-post</label><input class="ainput" id="aEmail" type="email" placeholder="restaurang@email.se"></div>
      <div class="afield"><label>Lösenord</label><input class="ainput" id="aPwd" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="aprimary" id="loginBtn" onclick="doLogin()">LOGGA IN</button>
    </div>
    <div class="auth-skip" onclick="skipAuth()">Fortsätt utan konto (demoläge) →</div>
  </div>
</div>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-tag">Atlas Delivery</div>
    <div class="sb-logo-main">Restaurang</div>
  </div>
  <div class="sb-rest">
    <div class="sb-rest-row">
      <div class="od" id="restDot"></div>
      <div>
        <div class="sb-rest-name" id="sbName">—</div>
        <div class="sb-rest-status" id="sbStatus">—</div>
      </div>
    </div>
    <div class="sb-sel">
      <select id="restSel" onchange="switchRest(this.value)"></select>
    </div>
  </div>
  <nav class="sb-nav">
    <button class="sb-item active" onclick="setPage('orders',this)"><span class="sb-icon">📋</span>Beställningar<span class="sb-badge" id="newBadge" style="display:none">0</span></button>
    <button class="sb-item" onclick="setPage('menu',this)"><span class="sb-icon">🍽️</span>Meny</button>
    <button class="sb-item" onclick="setPage('stats',this)"><span class="sb-icon">📊</span>Statistik</button>
  </nav>
  <div class="sb-bottom">
    <div class="toggle-row">
      <span>Restaurang öppen</span>
      <button class="pill on" id="openPill" onclick="toggleOpen()"></button>
    </div>
  </div>
</aside>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div class="tb-title" id="pageTitle">Beställningar</div>
    <div class="tb-right">
      <div class="sync-chip"><div class="od on" id="syncDot"></div><span id="syncTxt">ANSLUTER...</span></div>
      <div class="clock" id="clock">--:--:--</div>
      <button class="sim-btn" onclick="simulateOrder()">+ Testa beställning</button>
    </div>
  </div>
  <div class="content" id="content">
    <div style="display:flex;align-items:center;justify-content:center;height:300px;color:var(--muted);gap:10px;font-family:var(--fm);font-size:12px"><div style="width:20px;height:20px;border:2px solid rgba(0,212,255,.2);border-top-color:var(--cyan);border-radius:50%;animation:spin .7s linear infinite"></div>LADDAR...</div>
  </div>
</div>

<!-- NOTIF -->
<div class="notif" id="notif">
  <div class="notif-dot"></div>
  <div class="notif-body">
    <div class="notif-tag" id="notifTag">MEDDELANDE</div>
    <div class="notif-msg" id="notifMsg">—</div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"><div class="toast-dot"></div><span id="toastMsg">—</span></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SB = supabase.createClient(
  'https://vgtdswplzuhbhhlmxrgg.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZndGRzd3BsenVoYmhobG14cmdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMTY2ODIsImV4cCI6MjA4ODU5MjY4Mn0.82sk-40cQo7NxeRWUgthTzp_fk1TlBcqPchrBGGIFnU'
);

// ── State ─────────────────────────────────────────────────────
let page      = 'orders';
let activeRestId = null;
let restaurants  = [];
let orders       = [];
let selectedOId  = null;

// ── Clock ─────────────────────────────────────────────────────
setInterval(()=>{
  const n=new Date();
  document.getElementById('clock').textContent=
    [n.getHours(),n.getMinutes(),n.getSeconds()].map(x=>x.toString().padStart(2,'0')).join(':');
},1000);

// ── AUTH ──────────────────────────────────────────────────────
async function doLogin(){
  const email=document.getElementById('aEmail').value.trim();
  const pwd=document.getElementById('aPwd').value;
  const btn=document.getElementById('loginBtn');
  const err=document.getElementById('aerr');
  btn.disabled=true; btn.textContent='LOGGAR IN...';
  err.className='aerr';
  const{error}=await SB.auth.signInWithPassword({email,password:pwd});
  if(error){err.textContent=error.message;err.className='aerr show';btn.disabled=false;btn.textContent='LOGGA IN';return}
  document.getElementById('authWall').style.display='none';
  await loadAll();
}

async function skipAuth(){
  document.getElementById('authWall').style.display='none';
  await loadAll();
}

// ── LOAD ──────────────────────────────────────────────────────
async function loadAll(){
  const{data,error}=await SB.from('restaurants').select('*,menu_items(*)').order('name');
  if(error){toast('Fel vid laddning: '+error.message,'err');return}
  restaurants=data||[];

  const sel=document.getElementById('restSel');
  sel.innerHTML=restaurants.map(r=>`<option value="${r.id}">${r.name}</option>`).join('');
  activeRestId=restaurants[0]?.id||null;
  if(activeRestId) await switchRest(activeRestId,true);

  // Realtime
  SB.channel('rest-realtime')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'orders'},p=>{
      if(p.new.restaurant_id!==activeRestId)return;
      orders.unshift(p.new);
      onNewOrder(p.new);
      render();
    })
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'orders'},p=>{
      if(p.new.restaurant_id!==activeRestId)return;
      orders=orders.map(o=>o.id===p.new.id?p.new:o);
      if(selectedOId===p.new.id) renderDetail(p.new);
      render();
    })
    .on('postgres_changes',{event:'*',schema:'public',table:'restaurants'},async()=>{
      await reloadRestaurants();
    })
    .on('postgres_changes',{event:'*',schema:'public',table:'menu_items'},async()=>{
      await reloadRestaurants();
    })
    .subscribe(s=>{
      const ok=s==='SUBSCRIBED';
      document.getElementById('syncDot').className='od '+(ok?'on':'off');
      document.getElementById('syncTxt').textContent=ok?'LIVE — SUPABASE':'ANSLUTER...';
    });
}

async function reloadRestaurants(){
  const{data}=await SB.from('restaurants').select('*,menu_items(*)').order('name');
  if(data){
    restaurants=data;
    const r=restaurants.find(x=>x.id===activeRestId);
    if(r) updateSidebar(r);
    if(page==='menu') render();
  }
}

async function switchRest(id, initial=false){
  activeRestId=id;
  if(!initial) document.getElementById('restSel').value=id;
  const{data,error}=await SB.from('orders').select('*').eq('restaurant_id',id).order('created_at',{ascending:false}).limit(80);
  if(!error) orders=data||[];
  const r=restaurants.find(x=>x.id===id);
  if(r) updateSidebar(r);
  selectedOId=null;
  render();
}

function updateSidebar(r){
  document.getElementById('sbName').textContent=r.name;
  document.getElementById('sbStatus').textContent=r.is_open?'ÖPPEN':'STÄNGD';
  document.getElementById('sbStatus').style.color=r.is_open?'var(--green)':'var(--muted)';
  document.getElementById('restDot').className='od '+(r.is_open?'on':'off');
  document.getElementById('openPill').className='pill '+(r.is_open?'on':'off');
}

// ── TOGGLE OPEN ───────────────────────────────────────────────
async function toggleOpen(){
  const r=restaurants.find(x=>x.id===activeRestId);
  if(!r)return;
  const{error}=await SB.from('restaurants').update({is_open:!r.is_open}).eq('id',activeRestId);
  if(error){toast(error.message,'err');return}
  notify('STATUS',!r.is_open?'Restaurangen är nu öppen!':'Restaurangen är nu stängd.');
}

// ── PAGES ─────────────────────────────────────────────────────
const pageTitles={orders:'Beställningar',menu:'Meny',stats:'Statistik'};
function setPage(p,el){
  page=p;
  document.querySelectorAll('.sb-item').forEach(b=>b.classList.remove('active'));
  if(el) el.classList.add('active');
  document.getElementById('pageTitle').textContent=pageTitles[p]||p;
  selectedOId=null;
  render();
}

function render(){
  const c=document.getElementById('content');
  if(page==='orders') renderOrders(c);
  else if(page==='menu') renderMenu(c);
  else renderStats(c);
}

// ── ORDERS ────────────────────────────────────────────────────
function renderOrders(c){
  const r=restaurants.find(x=>x.id===activeRestId);
  const active=orders.filter(o=>!['delivered','cancelled'].includes(o.status));
  const newCount=orders.filter(o=>o.status==='new').length;
  const revenue=orders.filter(o=>o.status!=='cancelled').reduce((s,o)=>s+Number(o.total),0);

  const badge=document.getElementById('newBadge');
  badge.style.display=newCount?'':'none';
  badge.textContent=newCount;

  c.innerHTML=`
    <div class="stats-row">
      <div class="sc"><div class="sc-label">Intäkter (session)</div><div class="sc-val">${revenue.toFixed(0)} kr</div><div class="sc-sub" style="color:var(--muted)">${orders.length} ordrar</div></div>
      <div class="sc"><div class="sc-label">Aktiva</div><div class="sc-val">${active.length}</div><div class="sc-sub" style="color:var(--orange)">${newCount} nya</div></div>
      <div class="sc"><div class="sc-label">Betyg</div><div class="sc-val">${r?.rating||'—'} ⭐</div><div class="sc-sub" style="color:var(--muted)">${r?.review_count||0} rec</div></div>
      <div class="sc"><div class="sc-label">Tillagningstid</div><div class="sc-val">${r?.prep_time_min||20} min</div><div class="sc-sub" style="color:var(--muted)">Estimerat</div></div>
    </div>
    <div class="two-col">
      <div class="panel">
        <div class="ph"><div class="ph-title">Live-beställningar (${orders.length})</div><button class="ph-btn" onclick="switchRest(activeRestId)">↺ Uppdatera</button></div>
        <div id="orderList">
          ${orders.length===0?'<div class="no-orders">INGA BESTÄLLNINGAR ÄN — Testa med knappen ovan</div>':''}
          ${orders.map(o=>orderRowHTML(o)).join('')}
        </div>
      </div>
      <div class="panel" id="detailPanel">
        <div class="detail-empty"><div style="font-size:34px">📋</div>VÄLJ EN BESTÄLLNING</div>
      </div>
    </div>`;
}

const SL={new:'NY',accepted:'MOTTAGEN',preparing:'TILLAGAS',ready:'KLAR',picked:'HÄMTAD',delivered:'LEVERERAD',cancelled:'ANNULLERAD'};
function orderRowHTML(o){
  const items=typeof o.items==='string'?JSON.parse(o.items):o.items;
  const preview=(items||[]).map(i=>`${i.qty}× ${i.name}`).join(', ');
  const t=new Date(o.created_at);
  const tStr=t.getHours().toString().padStart(2,'0')+':'+t.getMinutes().toString().padStart(2,'0');
  return`<div class="orow${selectedOId===o.id?' selected':''}" onclick="selectOrder('${o.id}')">
    <div class="orow-top"><span class="oid">${o.id}</span><span class="badge b-${o.status}">${SL[o.status]||o.status}</span></div>
    <div class="ocust">${o.customer_name}</div>
    <div class="oprev">${preview}</div>
    <div class="orow-bot"><span class="otime">🕐 ${tStr}</span><span class="ototal">${Number(o.total).toFixed(0)} kr</span></div>
    <div class="oacts">
      ${o.status==='new'?`<button class="abtn accept" onclick="event.stopPropagation();upd('${o.id}','accepted')">✓ Acceptera</button><button class="abtn reject" onclick="event.stopPropagation();upd('${o.id}','cancelled')">✕</button>`:''}
      ${o.status==='accepted'?`<button class="abtn readybtn" onclick="event.stopPropagation();upd('${o.id}','preparing')">Börja tillaga</button>`:''}
      ${o.status==='preparing'?`<button class="abtn readybtn" onclick="event.stopPropagation();upd('${o.id}','ready')">Markera klar ✓</button>`:''}
    </div>
  </div>`;
}

function selectOrder(id){
  selectedOId=id;
  document.querySelectorAll('.orow').forEach(el=>{
    el.classList.toggle('selected',el.querySelector('.oid')?.textContent===id);
  });
  const o=orders.find(x=>x.id===id);
  if(o) renderDetail(o);
}

function renderDetail(o){
  const dp=document.getElementById('detailPanel');
  if(!dp)return;
  const items=typeof o.items==='string'?JSON.parse(o.items):o.items;
  dp.innerHTML=`
    <div class="ph"><div class="ph-title">${o.id}</div><span class="badge b-${o.status}">${SL[o.status]}</span></div>
    <div class="ds"><div class="ds-title">Kund</div>
      <div class="ds-row">${o.customer_name}</div>
      <div class="ds-row ds-muted">📍 ${o.address}</div>
      ${o.customer_email?`<div class="ds-row ds-muted">✉️ ${o.customer_email}</div>`:''}
      ${o.notes?`<div class="ds-row ds-muted">📝 ${o.notes}</div>`:''}
    </div>
    <div class="ds"><div class="ds-title">Artiklar</div>
      ${(items||[]).map(i=>`<div class="ds-row"><span>${i.qty}× ${i.name}</span><span class="ds-muted">${(i.price*i.qty).toFixed(0)} kr</span></div>`).join('')}
    </div>
    <div style="padding:13px 18px;display:flex;justify-content:space-between;font-family:var(--fd);font-size:16px;font-weight:700">
      <span>Totalt</span><span style="color:var(--cyan)">${Number(o.total).toFixed(0)} kr</span>
    </div>
    ${o.rider_id?`<div class="ds"><div class="ds-title">Bud</div><div class="ds-row">🛵 Tilldelad</div></div>`:''}
    <div style="padding:13px 18px;display:flex;flex-direction:column;gap:8px">
      ${o.status==='new'?`<button onclick="upd('${o.id}','accepted')" style="background:var(--grad);color:var(--bg);font-family:var(--fm);font-weight:600;font-size:12px;padding:12px;border-radius:9px;border:none;cursor:pointer;letter-spacing:.05em">ACCEPTERA BESTÄLLNING</button>`:''}
      ${o.status==='accepted'?`<button onclick="upd('${o.id}','preparing')" style="background:rgba(0,212,255,.1);color:var(--cyan);font-family:var(--fm);font-size:12px;padding:11px;border-radius:9px;border:1px solid rgba(0,212,255,.25);cursor:pointer">BÖRJA TILLAGA</button>`:''}
      ${o.status==='preparing'?`<button onclick="upd('${o.id}','ready')" style="background:rgba(0,255,136,.1);color:var(--green);font-family:var(--fm);font-size:12px;padding:11px;border-radius:9px;border:1px solid rgba(0,255,136,.25);cursor:pointer">MARKERA KLAR ✓</button>`:''}
    </div>`;
}

async function upd(id,status){
  const{error}=await SB.from('orders').update({status}).eq('id',id);
  if(error){toast(error.message,'err');return}
  notify('STATUS',`${id} → ${SL[status]}`);
}

function onNewOrder(o){
  notify('NY BESTÄLLNING',`${o.id} från ${o.customer_name}!`);
  document.getElementById('sbName').style.animation='none';
  requestAnimationFrame(()=>{ document.getElementById('sbName').style.animation='ring .6s 3'; });
  // Flash row when rendered
  setTimeout(()=>{
    const rows=document.querySelectorAll('.orow');
    rows.forEach(r=>{ if(r.querySelector('.oid')?.textContent===o.id) r.classList.add('new-flash'); });
  },100);
}

// ── MENU ──────────────────────────────────────────────────────
function renderMenu(c){
  const r=restaurants.find(x=>x.id===activeRestId);
  if(!r){c.innerHTML='<div class="no-orders">Ingen restaurang vald</div>';return}
  const items=(r.menu_items||[]).sort((a,b)=>a.sort_order-b.sort_order);
  const groups={};
  items.forEach(i=>{if(!groups[i.category])groups[i.category]=[];groups[i.category].push(i)});

  c.innerHTML=`<div class="panel">
    <div class="ph">
      <div class="ph-title">Meny — ${r.name}</div>
      <span style="font-family:var(--fm);font-size:10px;color:var(--muted)">${items.filter(i=>i.is_available).length}/${items.length} tillgängliga</span>
    </div>
    ${Object.entries(groups).map(([cat,its])=>`
      <div style="padding:9px 18px 2px;font-family:var(--fm);font-size:9px;color:var(--cyan);letter-spacing:.1em;text-transform:uppercase;border-top:1px solid var(--border)">${cat}</div>
      ${its.map(item=>`
        <div class="mrow">
          <div>
            <div class="mrow-name">${item.name}</div>
            <div class="mrow-meta">${item.price} kr · ${item.is_available?'<span style="color:var(--green)">Tillgänglig</span>':'<span style="color:var(--red)">Slutsåld</span>'}</div>
          </div>
          <button class="itoggle ${item.is_available?'on':'off'}" onclick="toggleItem('${item.id}',${!item.is_available})"></button>
        </div>
      `).join('')}
    `).join('')}
  </div>`;
}

async function toggleItem(itemId,available){
  const{error}=await SB.from('menu_items').update({is_available:available}).eq('id',itemId);
  if(error){toast(error.message,'err');return}
  notify('MENY',available?'Rätten är nu tillgänglig':'Rätten är markerad slutsåld');
}

// ── STATS ─────────────────────────────────────────────────────
function renderStats(c){
  const revenue=orders.filter(o=>o.status!=='cancelled').reduce((s,o)=>s+Number(o.total),0);
  const delivered=orders.filter(o=>o.status==='delivered').length;
  const r=restaurants.find(x=>x.id===activeRestId);
  const days=[{d:'Mån',v:78},{d:'Tis',v:92},{d:'Ons',v:65},{d:'Tor',v:110},{d:'Fre',v:145},{d:'Lör',v:188},{d:'Sön',v:130}];
  const max=Math.max(...days.map(d=>d.v));
  c.innerHTML=`
    <div class="stats-row">
      <div class="sc"><div class="sc-label">Totalt (session)</div><div class="sc-val">${revenue.toFixed(0)} kr</div></div>
      <div class="sc"><div class="sc-label">Ordrar</div><div class="sc-val">${orders.length}</div></div>
      <div class="sc"><div class="sc-label">Levererade</div><div class="sc-val">${delivered}</div></div>
      <div class="sc"><div class="sc-label">Betyg</div><div class="sc-val">${r?.rating||'—'} ⭐</div></div>
    </div>
    <div class="panel">
      <div class="ph"><div class="ph-title">Ordrar per dag (provdata)</div></div>
      <div style="padding:16px 18px">
        ${days.map(d=>`<div class="bar-row"><div class="bar-lbl">${d.d}</div><div class="bar-track"><div class="bar-fill" style="width:${(d.v/max*100).toFixed(0)}%"></div></div><div class="bar-num">${d.v}</div></div>`).join('')}
      </div>
    </div>`;
}

// ── SIMULATE ─────────────────────────────────────────────────
async function simulateOrder(){
  const r=restaurants.find(x=>x.id===activeRestId);
  if(!r)return;
  const avail=(r.menu_items||[]).filter(m=>m.is_available);
  if(!avail.length){toast('Inga tillgängliga rätter','err');return}
  const item=avail[Math.floor(Math.random()*avail.length)];
  const names=['Erik L.','Sara J.','Mikael B.','Anna P.','Lars K.','Sofia W.'];
  const addrs=['Sveavägen 45','Drottninggatan 12','Kungsgatan 78','Hornsgatan 22'];
  const name=names[Math.floor(Math.random()*names.length)];
  const addr=addrs[Math.floor(Math.random()*addrs.length)]+', Stockholm';

  const{data:oid}=await SB.rpc('next_order_id');
  const{error}=await SB.from('orders').insert({
    id:oid, restaurant_id:activeRestId,
    customer_name:name, address:addr,
    items:JSON.stringify([{itemId:item.id,name:item.name,price:item.price,qty:1}]),
    total:item.price, status:'new',
  });
  if(error) toast(error.message,'err');
  else toast(`Testorder ${oid} skapad!`,'info');
}

// ── NOTIFY / TOAST ───────────────────────────────────────────
let _nt;
function notify(tag,msg){
  document.getElementById('notifTag').textContent=tag;
  document.getElementById('notifMsg').textContent=msg;
  const el=document.getElementById('notif');
  el.classList.add('show');clearTimeout(_nt);
  _nt=setTimeout(()=>el.classList.remove('show'),3500);
}
let _tt;
function toast(msg,type=''){
  document.getElementById('toastMsg').textContent=msg;
  const el=document.getElementById('toast');
  el.className='toast'+(type?` toast--${type}`:'');
  el.classList.add('show');clearTimeout(_tt);
  _tt=setTimeout(()=>el.classList.remove('show'),3000);
}
</script>
</body>
</html>
