<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Atlas Delivery — Restaurant</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500;600&family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
const _cur=document.getElementById('cursor');const _cdot=document.getElementById('cursor-dot');
if(_cur){document.addEventListener('mousemove',e=>{_cur.style.left=e.clientX+'px';_cur.style.top=e.clientY+'px';_cdot.style.left=e.clientX+'px';_cdot.style.top=e.clientY+'px';});document.addEventListener('mouseover',e=>{if(e.target.closest('button,a,input,[onclick],.nav-btn,.kpi,.ocard,.hcard,.metric-card'))_cur.classList.add('hover');else _cur.classList.remove('hover');});}
</script>
<style>
:root {
  --bg:#04040C;--bg1:#070712;--bg2:#0A0A18;--bg3:#0E0E20;
  --glass:rgba(10,10,28,0.72);--glass2:rgba(14,14,32,0.88);
  --c:#00E5FF;--v:#7C3AED;--g:#00FF88;--o:#FF6B35;--r:#FF2D55;--y:#FFD60A;
  --w:#F0F0FF;--t2:#8080A8;--t3:#40405A;
  --border:rgba(0,229,255,0.14);
  --glow:0 0 20px rgba(0,229,255,0.15),0 0 60px rgba(0,229,255,0.05);
  --fd:'Rajdhani',sans-serif;--fm:'IBM Plex Mono',monospace;--fo:'Orbitron',sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{cursor:none}
body{background:var(--bg);color:var(--w);font-family:var(--fd);min-height:100vh;overflow-x:hidden}
#cursor{position:fixed;width:14px;height:14px;pointer-events:none;z-index:99999;border:1.5px solid var(--c);border-radius:50%;transform:translate(-50%,-50%);transition:width .15s,height .15s;mix-blend-mode:screen}
#cursor.hover{width:26px;height:26px;background:rgba(0,229,255,.07)}
#cursor-dot{position:fixed;width:4px;height:4px;background:var(--c);border-radius:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:99999;box-shadow:0 0 6px var(--c)}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");opacity:.022}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:1;background:repeating-linear-gradient(0deg,transparent 0px,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px)}
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;animation:orbFloat 8s ease-in-out infinite;filter:blur(80px)}
.orb1{width:500px;height:500px;background:radial-gradient(circle,rgba(0,229,255,.06),transparent 70%);top:-100px;left:-100px}
.orb2{width:400px;height:400px;background:radial-gradient(circle,rgba(124,58,237,.06),transparent 70%);bottom:-80px;right:-80px;animation-delay:-4s}
.orb3{width:300px;height:300px;background:radial-gradient(circle,rgba(0,255,136,.04),transparent 70%);top:40%;left:40%;animation-delay:-2s}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-20px) scale(1.05)}66%{transform:translate(-20px,30px) scale(.97)}}

body{display:flex}
#loginScreen{position:fixed;inset:0;z-index:900;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.login-terminal{width:420px;background:var(--glass2);backdrop-filter:blur(32px);border:1px solid rgba(255,107,53,.2);border-radius:4px;overflow:hidden;box-shadow:0 0 40px rgba(255,107,53,.1),0 40px 80px rgba(0,0,0,.6);animation:lIn .6s cubic-bezier(.34,1.56,.64,1)}
@keyframes lIn{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:none}}
.terminal-bar{background:rgba(255,107,53,.06);border-bottom:1px solid rgba(255,107,53,.15);padding:10px 16px;display:flex;align-items:center;gap:8px}
.t-dot{width:10px;height:10px;border-radius:50%}
.t-r{background:#FF3B5C;box-shadow:0 0 6px #FF3B5C}.t-y{background:#FFD60A;box-shadow:0 0 6px #FFD60A}.t-g{background:#00FF88;box-shadow:0 0 6px #00FF88}
.terminal-title{font-family:var(--fm);font-size:10px;color:var(--t2);letter-spacing:2px;margin-left:auto}
.login-inner{padding:30px 34px 34px}
.login-sys{font-family:var(--fm);font-size:10px;color:var(--o);letter-spacing:3px;text-transform:uppercase;margin-bottom:18px;opacity:.7}
.login-brand{font-family:var(--fo);font-size:26px;font-weight:700;background:linear-gradient(90deg,var(--o),var(--r));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:3px;margin-bottom:4px}
.login-sub{font-family:var(--fm);font-size:11px;color:var(--t2);letter-spacing:2px;margin-bottom:26px}
.f-group{margin-bottom:16px}
.f-label{display:block;font-family:var(--fm);font-size:9px;letter-spacing:3px;color:var(--o);text-transform:uppercase;margin-bottom:7px;opacity:.8}
.f-wrap{position:relative}
.f-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;opacity:.5;pointer-events:none;z-index:1}
.f-input{width:100%;padding:11px 14px 11px 38px;background:rgba(255,107,53,.04);border:1px solid rgba(255,107,53,.2);border-radius:3px;color:var(--w);font-family:var(--fm);font-size:13px;outline:none;transition:.2s}
.f-input:focus{border-color:var(--o);background:rgba(255,107,53,.07);box-shadow:0 0 0 3px rgba(255,107,53,.08)}
.f-input::placeholder{color:var(--t3)}
.btn-login{width:100%;padding:13px;background:linear-gradient(135deg,rgba(255,107,53,.15),rgba(255,45,85,.12));border:1px solid rgba(255,107,53,.3);border-radius:3px;color:var(--o);font-family:var(--fo);font-size:12px;font-weight:500;letter-spacing:3px;cursor:pointer;transition:.2s;margin-top:6px}
.btn-login:hover{border-color:var(--o);box-shadow:0 0 20px rgba(255,107,53,.2);color:var(--w)}
.login-err{margin-top:12px;padding:10px 14px;background:rgba(255,45,85,.08);border:1px solid rgba(255,45,85,.25);border-radius:3px;color:var(--r);font-family:var(--fm);font-size:11px;text-align:center;display:none}
#appShell{display:none;flex-direction:row;min-height:100vh}
.sidebar{width:230px;min-height:100vh;background:var(--glass);backdrop-filter:blur(24px);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:100}
.sidebar::before{content:'';position:absolute;right:-1px;top:0;bottom:0;width:1px;background:linear-gradient(180deg,transparent,var(--o) 40%,var(--r) 70%,transparent);animation:bFlow 4s ease-in-out infinite;opacity:.5}
@keyframes bFlow{0%,100%{opacity:.2}50%{opacity:.7}}
.sb-head{padding:22px 18px 16px;border-bottom:1px solid rgba(255,255,255,.04)}
.sb-sys{font-family:var(--fm);font-size:9px;color:var(--o);letter-spacing:3px;text-transform:uppercase;opacity:.6;margin-bottom:4px}
.sb-name{font-family:var(--fo);font-size:15px;font-weight:700;letter-spacing:1px;color:var(--w);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-name .dot{color:var(--o)}
.st-toggle{display:flex;align-items:center;gap:8px;margin-top:10px;padding:8px 12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:3px;cursor:pointer;transition:.2s}
.st-toggle:hover{border-color:rgba(0,255,136,.2)}
.st-dot{width:7px;height:7px;border-radius:50%;background:var(--r);transition:.3s;flex-shrink:0}
.st-dot.on{background:var(--g);box-shadow:0 0 8px var(--g)}
.st-lbl{font-family:var(--fm);font-size:10px;color:var(--t2);letter-spacing:1px}
.sb-nav{flex:1;padding:12px 10px;overflow-y:auto}
.nav-btn{display:flex;align-items:center;gap:10px;width:100%;padding:9px 12px;border-radius:3px;cursor:pointer;color:var(--t2);font-family:var(--fd);font-size:14px;font-weight:500;letter-spacing:.5px;transition:.2s;margin-bottom:1px;background:none;border:none;text-align:left;position:relative;overflow:hidden}
.nav-btn::before{content:'';position:absolute;left:0;top:0;bottom:0;width:0;background:linear-gradient(90deg,rgba(255,107,53,.07),transparent);transition:.2s}
.nav-btn:hover::before{width:100%}
.nav-btn:hover{color:var(--w)}
.nav-btn.active{color:var(--o);background:rgba(255,107,53,.08);border:1px solid rgba(255,107,53,.18)}
.nav-btn.active::after{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--o);box-shadow:0 0 8px var(--o)}
.nav-icon{font-size:15px;width:19px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--r);color:#fff;font-family:var(--fm);font-size:9px;font-weight:600;padding:2px 6px;border-radius:2px;box-shadow:0 0 8px rgba(255,45,85,.4);animation:pBadge 1.5s infinite}
@keyframes pBadge{0%,100%{box-shadow:0 0 8px rgba(255,45,85,.4)}50%{box-shadow:0 0 16px rgba(255,45,85,.7)}}
.sb-foot{padding:12px 10px;border-top:1px solid rgba(255,255,255,.04)}
.btn-logout{width:100%;padding:9px;background:transparent;border:1px solid rgba(255,45,85,.2);border-radius:3px;color:var(--t2);font-family:var(--fd);font-size:13px;cursor:pointer;transition:.2s;letter-spacing:.5px}
.btn-logout:hover{border-color:var(--r);color:var(--r);background:rgba(255,45,85,.06)}
.main{margin-left:230px;flex:1;padding:24px}
.page{display:none;animation:pageIn .3s ease}
.page.active{display:block}
@keyframes pageIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.page-title{font-family:var(--fo);font-size:20px;font-weight:500;letter-spacing:2px;margin-bottom:4px;color:var(--w)}
.page-sub{font-family:var(--fm);font-size:11px;color:var(--t2);letter-spacing:1px;margin-bottom:22px}
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.col-head{padding:10px 14px;border-radius:3px 3px 0 0;font-family:var(--fm);font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between}
.col-body{background:var(--glass);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.05);border-top:none;border-radius:0 0 3px 3px;padding:10px;min-height:280px}
.col-nya .col-head{background:rgba(0,229,255,.07);color:var(--c);border:1px solid rgba(0,229,255,.15);border-bottom:none}
.col-tillagas .col-head{background:rgba(255,214,10,.07);color:var(--y);border:1px solid rgba(255,214,10,.15);border-bottom:none}
.col-klar .col-head{background:rgba(0,255,136,.07);color:var(--g);border:1px solid rgba(0,255,136,.15);border-bottom:none}
.col-hamtad .col-head{background:rgba(124,58,237,.07);color:#B06EFF;border:1px solid rgba(124,58,237,.15);border-bottom:none}
.ocard{background:var(--glass2);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.06);border-radius:3px;padding:13px;margin-bottom:8px;cursor:pointer;transition:.25s;position:relative;overflow:visible}
.ocard::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,107,53,.4),transparent);opacity:0;transition:.2s}
.ocard:hover{border-color:rgba(0,229,255,.25);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.4)}
.ocard:hover::before{opacity:1}
.ocard:hover .holo{display:block}
.ocard-top{display:flex;justify-content:space-between;margin-bottom:7px}
.ocard-id{font-family:var(--fm);font-size:10px;color:var(--c);letter-spacing:1px}
.ocard-time{font-family:var(--fm);font-size:9px;color:var(--t2)}
.ocard-name{font-family:var(--fo);font-size:13px;font-weight:500;margin-bottom:3px;color:var(--w);letter-spacing:.5px}
.ocard-items{font-size:11px;color:var(--t2);margin-bottom:9px;line-height:1.4;font-family:var(--fm)}
.ocard-footer{display:flex;justify-content:space-between;align-items:center}
.ocard-total{font-family:var(--fo);font-size:14px;font-weight:600;color:var(--g)}
.ocard-acts{display:flex;gap:5px}
.btn-act{padding:5px 10px;border-radius:2px;font-family:var(--fm);font-size:9px;font-weight:600;cursor:pointer;border:none;transition:.2s;letter-spacing:.5px}
.btn-accept{background:rgba(0,229,255,.1);color:var(--c);border:1px solid rgba(0,229,255,.25)}.btn-accept:hover{background:var(--c);color:#000}
.btn-ready{background:rgba(0,255,136,.1);color:var(--g);border:1px solid rgba(0,255,136,.25)}.btn-ready:hover{background:var(--g);color:#000}
.btn-chat{background:rgba(124,58,237,.1);color:#B06EFF;border:1px solid rgba(124,58,237,.25)}.btn-chat:hover{background:var(--v);color:#fff}
.holo{display:none;position:absolute;top:50%;left:calc(100% + 10px);transform:translateY(-50%);width:250px;z-index:999;background:rgba(4,4,16,.95);backdrop-filter:blur(20px);border:1px solid var(--c);border-radius:3px;padding:14px;box-shadow:0 0 30px rgba(0,229,255,.12),inset 0 0 20px rgba(0,229,255,.015);pointer-events:none;animation:holoIn .2s ease}
@keyframes holoIn{from{opacity:0;transform:translateY(-50%) translateX(-5px)}to{opacity:1;transform:translateY(-50%)}}
.holo::before{content:'';position:absolute;left:-7px;top:50%;transform:translateY(-50%);border:7px solid transparent;border-right-color:var(--c);border-left:none}
.holo::after{content:'';position:absolute;inset:0;border-radius:3px;pointer-events:none;background:repeating-linear-gradient(0deg,transparent 0px,transparent 3px,rgba(0,229,255,.012) 3px,rgba(0,229,255,.012) 4px)}
.holo-title{font-family:var(--fo);font-size:8px;letter-spacing:3px;color:var(--c);margin-bottom:10px;text-transform:uppercase}
.holo-r{display:flex;justify-content:space-between;margin-bottom:4px;font-size:10px}
.holo-l{color:var(--t3);font-family:var(--fm)}.holo-v{color:var(--w);font-family:var(--fm);font-weight:500;text-align:right;max-width:140px;word-break:break-all}
.holo-sep{border:none;border-top:1px solid rgba(0,229,255,.08);margin:6px 0}
.meny-toolbar{display:flex;gap:9px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.btn-add{padding:9px 18px;background:linear-gradient(135deg,rgba(255,107,53,.15),rgba(255,45,85,.12));border:1px solid rgba(255,107,53,.3);border-radius:3px;color:var(--o);font-family:var(--fo);font-size:11px;font-weight:500;letter-spacing:2px;cursor:pointer;transition:.2s}
.btn-add:hover{border-color:var(--o);color:var(--w);box-shadow:0 0 20px rgba(255,107,53,.15)}
.btn-cats{padding:9px 14px;background:transparent;border:1px solid var(--border);border-radius:3px;color:var(--t2);font-family:var(--fm);font-size:10px;letter-spacing:1px;cursor:pointer;transition:.2s}
.btn-cats:hover{border-color:var(--o);color:var(--o)}
.filter-tabs{display:flex;gap:5px;flex-wrap:wrap}
.ftab{padding:6px 14px;border-radius:20px;font-family:var(--fm);font-size:10px;cursor:pointer;background:transparent;border:1px solid rgba(255,255,255,.07);color:var(--t2);transition:.2s;letter-spacing:.5px}
.ftab.active{background:rgba(255,107,53,.1);border-color:rgba(255,107,53,.3);color:var(--o)}
.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.menu-card{background:var(--glass);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.06);border-radius:4px;padding:16px;transition:.2s;position:relative;overflow:hidden}
.menu-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,107,53,.3),transparent);opacity:0;transition:.2s}
.menu-card:hover{border-color:rgba(255,107,53,.2)}.menu-card:hover::before{opacity:1}
.mc-top{display:flex;justify-content:space-between;margin-bottom:10px}
.mc-emoji{font-size:32px}
.mc-toggle{width:36px;height:20px;background:rgba(255,255,255,.06);border-radius:20px;border:1px solid rgba(255,255,255,.1);cursor:pointer;position:relative;transition:.3s}
.mc-toggle.on{background:rgba(0,255,136,.2);border-color:rgba(0,255,136,.3)}
.mc-toggle::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:var(--t3);transition:.3s}
.mc-toggle.on::after{left:18px;background:var(--g);box-shadow:0 0 6px var(--g)}
.mc-name{font-family:var(--fo);font-size:14px;font-weight:500;letter-spacing:.5px;margin-bottom:3px;color:var(--w)}
.mc-desc{font-size:12px;color:var(--t2);margin-bottom:7px;line-height:1.4}
.allergen-tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:7px}
.atag{padding:1px 7px;border-radius:2px;font-family:var(--fm);font-size:9px;font-weight:600;letter-spacing:.5px}
.atag-g{background:rgba(255,107,53,.1);color:var(--o);border:1px solid rgba(255,107,53,.2)}
.atag-l{background:rgba(255,214,10,.1);color:var(--y);border:1px solid rgba(255,214,10,.2)}
.atag-n{background:rgba(255,45,85,.1);color:var(--r);border:1px solid rgba(255,45,85,.2)}
.atag-v{background:rgba(0,255,136,.1);color:var(--g);border:1px solid rgba(0,255,136,.2)}
.atag-o{background:rgba(64,64,90,.2);color:var(--t2);border:1px solid rgba(64,64,90,.3)}
.mc-footer{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.mc-price{font-family:var(--fo);font-size:15px;font-weight:600;color:var(--c)}
.mc-cat{font-family:var(--fm);font-size:9px;color:var(--t3);letter-spacing:1px}
.mc-edit{padding:4px 10px;background:transparent;border:1px solid rgba(255,255,255,.08);border-radius:2px;color:var(--t2);font-family:var(--fm);font-size:9px;cursor:pointer;transition:.2s;letter-spacing:.5px}
.mc-edit:hover{border-color:var(--o);color:var(--o)}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:22px}
.stat-card{background:var(--glass);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:4px;padding:18px;position:relative;overflow:hidden;transition:.2s}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--c),transparent);opacity:.4}
.stat-card:hover{border-color:rgba(0,229,255,.25)}
.stat-label{font-family:var(--fm);font-size:9px;letter-spacing:2px;color:var(--t2);text-transform:uppercase;margin-bottom:8px}
.stat-val{font-family:var(--fo);font-size:26px;font-weight:700}
.hist-table{width:100%;border-collapse:separate;border-spacing:0}
.hist-table th{padding:9px 14px;text-align:left;font-family:var(--fm);font-size:9px;letter-spacing:2px;color:var(--t3);text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,.04)}
.hist-table td{padding:11px 14px;border-bottom:1px solid rgba(255,255,255,.025);font-size:13px;color:var(--t2)}
.hist-table tr:hover td{background:rgba(0,229,255,.02);color:var(--w)}
.art-cell{font-family:var(--fo);font-size:13px;font-weight:600;color:var(--c);cursor:pointer;position:relative}
.art-tooltip{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--glass2);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:3px;padding:8px 12px;min-width:180px;z-index:999;font-family:var(--fm);font-size:11px;color:var(--w);white-space:nowrap;box-shadow:0 8px 30px rgba(0,0,0,.5)}
.art-cell:hover .art-tooltip{display:block}
.profil-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.profil-sec{background:var(--glass);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:4px;padding:20px;position:relative;overflow:hidden}
.profil-sec::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--o),transparent);opacity:.4}
.profil-sec.full{grid-column:1/-1}
.profil-sec-title{font-family:var(--fo);font-size:10px;letter-spacing:2px;color:var(--o);margin-bottom:14px;text-transform:uppercase}
.p-group{margin-bottom:12px}
.p-label{display:block;font-family:var(--fm);font-size:9px;letter-spacing:2px;color:var(--t2);margin-bottom:5px;text-transform:uppercase}

<script>
const SB_URL = 'https://vgtdswplzuhbhhlmxrgg.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZndGRzd3BsenVoYmhobG14cmdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMTY2ODIsImV4cCI6MjA4ODU5MjY4Mn0.82sk-40cQo7NxeRWUgthTzp_fk1TlBcqPchrBGGIFnU';
const { createClient } = supabase;
const SB = createClient(SB_URL, SB_KEY);

let REST = null, ORDERS = [], MENU = [], CATS = [];
let currentPage = 'ordrar', isOpen = false;
let chatOrderId = null, chatCh = 'customer', chatSub = null;
let editingItemId = null, activeFilter = 'all';

// ── LOGIN ─────────────────────────────────────────────────────
async function doLogin() {
  const email = document.getElementById('lEmail').value.trim();
  const pass  = document.getElementById('lPass').value;
  const err   = document.getElementById('lErr');
  err.style.display = 'none';
  if (!email || !pass) { showErr('Fyll i alla fält'); return; }

  const { data, error } = await SB.auth.signInWithPassword({ email, password: pass });
  if (error) { showErr('Fel e-post eller lösenord'); return; }

  const uid = data.user.id;
  let rest = null;

  // Strategy 1: auth_user_id match
  try { const { data: r } = await SB.from('restaurants').select('*').eq('auth_user_id', uid).maybeSingle(); if (r) rest = r; } catch(e) {}
  // Strategy 2: email match
  if (!rest) { try { const { data: r } = await SB.from('restaurants').select('*').eq('email', email).maybeSingle(); if (r) rest = r; } catch(e) {} }
  // Strategy 3: profile role=restaurant → first unassigned
  if (!rest) {
    try {
      const { data: prof } = await SB.from('profiles').select('*').eq('id', uid).maybeSingle();
      if (prof && prof.role === 'restaurant') {
        const { data: rows } = await SB.from('restaurants').select('*').is('auth_user_id', null).limit(1);
        if (rows && rows[0]) {
          await SB.from('restaurants').update({ auth_user_id: uid, email }).eq('id', rows[0].id);
          rest = { ...rows[0], auth_user_id: uid, email };
        }
      }
    } catch(e) {}
  }
  // Strategy 4: first restaurant (fallback for setup)
  if (!rest) { try { const { data: rows } = await SB.from('restaurants').select('*').limit(1); if (rows && rows[0]) rest = rows[0]; } catch(e) {} }

  if (!rest) { showErr('Ingen restaurang kopplad. Kontakta admin.'); await SB.auth.signOut(); return; }

  REST = rest;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appShell').style.display = 'flex';
  document.getElementById('sbName').innerHTML = REST.name + '<span class="dot">.</span>';
  isOpen = REST.is_open || false;
  updateStatusUI();
  await Promise.all([loadMenu(), loadCats()]);
  subscribeOrders();
  renderPage('ordrar');
}

function showErr(msg) { const e = document.getElementById('lErr'); e.style.display = 'block'; e.textContent = msg; }
async function doLogout() { await SB.auth.signOut(); location.reload(); }

// ── DATA ─────────────────────────────────────────────────────
async function loadMenu() {
  const { data } = await SB.from('menu_items').select('*').eq('restaurant_id', REST.id).order('sort_order');
  MENU = data || [];
}
async function loadCats() {
  const { data } = await SB.from('menu_categories').select('*').eq('restaurant_id', REST.id).order('sort_order');
  if (data && data.length) { CATS = data.map(c => c.name); return; }
  const cats = [...new Set(MENU.map(i => i.category).filter(Boolean))];
  CATS = cats.length ? cats : ['Förrätter', 'Huvudrätter', 'Desserter', 'Drycker'];
}

function subscribeOrders() {
  SB.channel('rest-orders-' + REST.id)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'orders', filter: `restaurant_id=eq.${REST.id}` },
      async () => { await loadOrders(); if (currentPage === 'ordrar') renderOrdrarPage(); })
    .subscribe();
  loadOrders().then(() => { if (currentPage === 'ordrar') renderOrdrarPage(); });
}

async function loadOrders() {
  const { data } = await SB.from('orders').select('*').eq('restaurant_id', REST.id)
    .in('status', ['pending','paid','new','accepted','ready','picked']).order('created_at', { ascending: false });
  ORDERS = data || [];
  const n = ORDERS.filter(o => o.status === 'pending' || o.status === 'paid' || o.status === 'new').length;
  const b = document.getElementById('newBadge');
  b.style.display = n > 0 ? 'inline' : 'none'; b.textContent = n;
}

// ── NAV ──────────────────────────────────────────────────────
function goTo(page) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => { if (b.textContent.toLowerCase().includes(page.substring(0,3))) b.classList.add('active'); });
  currentPage = page; renderPage(page);
}
function renderPage(page) {
  const m = document.getElementById('mainContent');
  const pages = { ordrar: renderOrdrarPage, meny: renderMenyPage,
    historik: renderHistorikPage, statistik: renderStatistikPage, profil: renderProfilPage };
  if (pages[page]) pages[page]();
}

// ── ORDRAR ───────────────────────────────────────────────────
function renderOrdrarPage() {
  const cols = {
    nya: ORDERS.filter(o => ['pending','paid','new'].includes(o.status)),
    tillagas: ORDERS.filter(o => o.status === 'accepted'),
    klar: ORDERS.filter(o => o.status === 'ready'),
    hamtad: ORDERS.filter(o => o.status === 'picked')
  };
  document.getElementById('mainContent').innerHTML = `
    <div class="page-title">Ordrar</div>
    <div class="page-sub">${REST.name} · Live</div>
    <div class="kanban">
      <div class="col-nya"><div class="col-head">📥 Nya <span>${cols.nya.length}</span></div>
        <div class="col-body">${cols.nya.map(o => ocard(o)).join('') || empty('Inga nya ordrar')}</div></div>
      <div class="col-tillagas"><div class="col-head">👨‍🍳 Tillagas <span>${cols.tillagas.length}</span></div>
        <div class="col-body">${cols.tillagas.map(o => ocard(o)).join('') || empty('Inga under tillagning')}</div></div>
      <div class="col-klar"><div class="col-head">✅ Klar <span>${cols.klar.length}</span></div>
        <div class="col-body">${cols.klar.map(o => ocard(o)).join('') || empty('Inga klara')}</div></div>
      <div class="col-hamtad"><div class="col-head">🛵 Hämtad <span>${cols.hamtad.length}</span></div>
        <div class="col-body">${cols.hamtad.map(o => ocard(o)).join('') || empty('Inga hämtade')}</div></div>
    </div>`;
}

function ocard(o) {
  const items = (() => { try { return Array.isArray(o.items) ? o.items : JSON.parse(o.items || '[]'); } catch(e) { return []; } })();
  const itemsText = items.map(i => `${i.qty||i.quantity||1}× ${i.name}`).join(', ');
  const t = new Date(o.created_at).toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'});
  const total = o.total_amount || o.total || 0;
  const phone = o.customer_phone || '–';
  const addr = o.delivery_address || o.customer_address || o.address || '–';
  let acts = '';
  if (['pending','paid','new'].includes(o.status)) acts = `<button class="btn-act btn-accept" onclick="updOrd('${o.id}','accepted')">Acceptera</button>`;
  else if (o.status === 'accepted') acts = `<button class="btn-act btn-ready" onclick="updOrd('${o.id}','ready')">Klar</button>`;
  acts += `<button class="btn-act btn-chat" onclick="openChat('${o.id}')">💬</button>`;
  return `<div class="ocard">
    <div class="ocard-top"><span class="ocard-id">${(o.id||'').slice(0,8)}</span><span class="ocard-time">${t}</span></div>
    <div class="ocard-name">${o.customer_name||'Kund'}</div>
    <div class="ocard-items">${itemsText}</div>
    <div class="ocard-footer"><span class="ocard-total">${total} kr</span><div class="ocard-acts">${acts}</div></div>
    <div class="holo">
      <div class="holo-title">⬡ Orderdetaljer</div>
      <div class="holo-r"><span class="holo-l">ID</span><span class="holo-v">${(o.id||'').slice(0,12)}</span></div>
      <div class="holo-r"><span class="holo-l">Tid</span><span class="holo-v">${t}</span></div>
      <hr class="holo-sep">
      <div class="holo-r"><span class="holo-l">Kund</span><span class="holo-v">${o.customer_name||'–'}</span></div>
      <div class="holo-r"><span class="holo-l">Tel</span><span class="holo-v">${phone}</span></div>
      <div class="holo-r"><span class="holo-l">Adress</span><span class="holo-v">${addr}</span></div>
      <hr class="holo-sep">
      <div class="holo-r"><span class="holo-l">Mat</span><span class="holo-v">${(total-(o.delivery_fee||0)-(o.tip||0))} kr</span></div>
      <div class="holo-r"><span class="holo-l">Leverans</span><span class="holo-v">${o.delivery_fee||0} kr</span></div>
      <div class="holo-r"><span class="holo-l">Dricks</span><span class="holo-v">${o.tip||0} kr</span></div>
      <div class="holo-r"><span class="holo-l">Totalt</span><span class="holo-v" style="color:var(--green)">${total} kr</span></div>
      <hr class="holo-sep">
      <div class="holo-r"><span class="holo-l">Artiklar</span><span class="holo-v">${itemsText||'–'}</span></div>
    </div>
  </div>`;
}

function empty(txt) { return `<div class="empty-state">○<br>${txt}</div>`; }

async function updOrd(id, status) {
  const { error } = await SB.from('orders').update({ status }).eq('id', id);
  if (error) { toast('❌ ' + error.message); return; }
  toast('✅ → ' + status);
  await loadOrders(); renderOrdrarPage();
}

// ── STATUS ───────────────────────────────────────────────────
function updateStatusUI() {
  const dot = document.getElementById('stDot'); const lbl = document.getElementById('stLabel');
  dot.classList.toggle('on', isOpen); lbl.textContent = isOpen ? 'Öppen' : 'Stängd';
}
function toggleStatus() {
  isOpen = !isOpen; updateStatusUI();
  SB.from('restaurants').update({ is_open: isOpen }).eq('id', REST.id);
  toast(isOpen ? '✅ Restaurangen öppen' : '🔴 Restaurangen stängd');
}

// ── MENY PAGE ────────────────────────────────────────────────
function renderMenyPage() {
  const filtered = activeFilter === 'all' ? MENU : MENU.filter(i => i.category === activeFilter);
  document.getElementById('mainContent').innerHTML = `
    <div class="page-title">Meny</div>
    <div class="page-sub">${MENU.length} rätter · ${CATS.length} kategorier</div>
    <div class="meny-toolbar">
      <button class="btn-add" onclick="openItemModal()">+ Ny rätt</button>
      <button class="btn-cats" onclick="openCatModal()">⚙ Kategorier</button>
      <div class="filter-tabs">
        <div class="ftab ${activeFilter==='all'?'active':''}" onclick="setFilter('all')">Alla</div>
        ${CATS.map(c => `<div class="ftab ${activeFilter===c?'active':''}" onclick="setFilter('${c}')">${c}</div>`).join('')}
      </div>
    </div>
    <div class="menu-grid">${filtered.map(i => menuCard(i)).join('')}${filtered.length===0?'<div class="empty-state">🍽️<br>Inga rätter i denna kategori</div>':''}</div>`;
}

function setFilter(f) { activeFilter = f; renderMenyPage(); }

function menuCard(item) {
  const allergens = item.allergens || [];
  const aTags = allergens.map(a => {
    const cls = a.toLowerCase().includes('gluten')?'atag-g':a.toLowerCase().includes('lakt')?'atag-l':a.toLowerCase().includes('nöt')?'atag-n':a.toLowerCase().includes('vegan')?'atag-v':'atag-o';
    return `<span class="atag ${cls}">${a}</span>`;
  }).join('');
  return `<div class="menu-card ${item.available===false?'':''}" style="${item.available===false?'opacity:.5':''}">
    <div class="mc-top">
      <span class="mc-emoji">${item.emoji||item.image_url||'🍽️'}</span>
      <div class="mc-toggle ${item.available!==false?'on':''}" onclick="toggleAvail('${item.id}',${item.available!==false})"></div>
    </div>
    <div class="mc-name">${item.name}</div>
    <div class="mc-desc">${item.description||''}</div>
    ${aTags?`<div class="allergen-tags">${aTags}</div>`:''}
    <div class="mc-footer">
      <span class="mc-price">${item.price} kr</span>
      <span class="mc-cat">${item.category||''}</span>
    </div>
    <button class="mc-edit" onclick="openItemModal('${item.id}')">✏️ Redigera</button>
  </div>`;
}

async function toggleAvail(id, current) {
  await SB.from('menu_items').update({ available: !current }).eq('id', id);
  await loadMenu(); renderMenyPage();
}

// ── ITEM MODAL ───────────────────────────────────────────────
function openItemModal(id) {
  editingItemId = id || null;
  document.getElementById('itemModalTitle').textContent = id ? 'Redigera rätt' : 'Ny rätt';
  document.getElementById('iDelBtn').style.display = id ? 'inline-block' : 'none';
  // populate category select
  const sel = document.getElementById('iKat');
  sel.innerHTML = CATS.map(c => `<option value="${c}">${c}</option>`).join('');
  // reset allergens
  document.querySelectorAll('.ach').forEach(l => { l.classList.remove('checked'); l.querySelector('input').checked = false; });
  if (id) {
    const item = MENU.find(i => String(i.id) === String(id));
    if (!item) return;
    document.getElementById('iNamn').value = item.name || '';
    document.getElementById('iBeskr').value = item.description || '';
    document.getElementById('iPris').value = item.price || '';
    document.getElementById('iEmoji').value = item.emoji || item.image_url || '';
    sel.value = item.category || CATS[0] || '';
    (item.allergens || []).forEach(a => {
      document.querySelectorAll('.ach').forEach(l => { if (l.querySelector('input').value === a) { l.classList.add('checked'); l.querySelector('input').checked = true; } });
    });
  } else {
    ['iNamn','iBeskr','iPris','iEmoji'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
  }
  openModal('itemModal');
}

function toggleAch(el) { el.classList.toggle('checked'); el.querySelector('input').checked = el.classList.contains('checked'); }

async function saveItem() {
  const name = document.getElementById('iNamn').value.trim();
  const price = parseFloat(document.getElementById('iPris').value);
  if (!name || !price) { toast('❌ Namn och pris krävs'); return; }
  const payload = {
    name, price, description: document.getElementById('iBeskr').value.trim(),
    emoji: document.getElementById('iEmoji').value.trim() || '🍽️',
    category: document.getElementById('iKat').value,
    allergens: [...document.querySelectorAll('.ach.checked')].map(l => l.querySelector('input').value),
    available: true, restaurant_id: REST.id
  };
  if (editingItemId) {
    const { error } = await SB.from('menu_items').update(payload).eq('id', editingItemId);
    if (error) { toast('❌ ' + error.message); return; }
  } else {
    const { error } = await SB.from('menu_items').insert(payload);
    if (error) { toast('❌ ' + error.message); return; }
  }
  toast('✅ Rätt sparad'); closeModal('itemModal');
  await loadMenu(); renderMenyPage();
}

async function deleteItem() {
  if (!confirm('Ta bort?')) return;
  await SB.from('menu_items').delete().eq('id', editingItemId);
  toast('🗑️ Borttagen'); closeModal('itemModal');
  await loadMenu(); renderMenyPage();
}

// ── CAT MODAL ────────────────────────────────────────────────
function openCatModal() { renderCatList(); openModal('catModal'); }
function renderCatList() {
  document.getElementById('catList').innerHTML = CATS.map(c => {
    const n = MENU.filter(i => i.category === c).length;
    return `<div class="cat-item">
      <span class="cat-name">${c}</span><span class="cat-count">${n} rätter</span>
      <button class="btn-cat-r" onclick="renameCat('${c}')">Byt namn</button>
      <button class="btn-cat-d" onclick="deleteCat('${c}')">✕</button>
    </div>`;
  }).join('') || '<div style="color:var(--text3);font-size:12px">Inga kategorier</div>';
}
async function addCat() {
  const name = document.getElementById('newCatInp').value.trim();
  if (!name || CATS.includes(name)) return;
  await SB.from('menu_categories').insert({ restaurant_id: REST.id, name, sort_order: CATS.length });
  CATS.push(name); document.getElementById('newCatInp').value = '';
  renderCatList(); toast('✅ Kategori tillagd');
}
async function renameCat(old) {
  const n = prompt('Nytt namn:', old); if (!n || n === old) return;
  await SB.from('menu_items').update({ category: n }).eq('restaurant_id', REST.id).eq('category', old);
  await SB.from('menu_categories').update({ name: n }).eq('restaurant_id', REST.id).eq('name', old);
  CATS = CATS.map(c => c === old ? n : c);
  await loadMenu(); renderCatList(); toast('✅ Kategori omdöpt');
}
async function deleteCat(name) {
  if (!confirm(`Ta bort "${name}"?`)) return;
  await SB.from('menu_categories').delete().eq('restaurant_id', REST.id).eq('name', name);
  CATS = CATS.filter(c => c !== name); renderCatList(); toast('🗑️ Kategori borttagen');
}

// ── HISTORIK ─────────────────────────────────────────────────
async function renderHistorikPage() {
  const { data: orders } = await SB.from('orders').select('*').eq('restaurant_id', REST.id).eq('status', 'delivered').order('created_at', { ascending: false }).limit(50);
  const rows = (orders||[]).map(o => {
    const items = (() => { try { return Array.isArray(o.items) ? o.items : JSON.parse(o.items || '[]'); } catch(e) { return []; } })();
    const n = items.reduce((s, i) => s + (i.qty || i.quantity || 1), 0);
    const tooltip = items.map(i => `${i.qty||i.quantity||1}× ${i.name}`).join('<br>');
    const d = new Date(o.created_at).toLocaleDateString('sv-SE');
    return `<tr>
      <td class="ocard-id" style="color:var(--cyan);font-family:var(--mono)">${(o.id||'').slice(0,10)}</td>
      <td style="color:var(--text)">${d}</td>
      <td style="color:var(--text)">${o.customer_name||'–'}</td>
      <td class="art-cell">${n}<div class="art-tooltip">${tooltip}</div></td>
      <td style="color:var(--green);font-family:var(--mono)">${o.total_amount||o.total||0} kr</td>
    </tr>`;
  }).join('');
  document.getElementById('mainContent').innerHTML = `
    <div class="page-title">Historik</div>
    <div class="page-sub">Levererade ordrar</div>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:11px;overflow-x:auto">
      <table class="hist-table"><thead><tr><th>Order-ID</th><th>Datum</th><th>Kund</th><th>Artiklar</th><th>Totalt</th></tr></thead>
      <tbody>${rows || '<tr><td colspan="5" style="text-align:center;color:var(--text3);padding:30px">Inga levererade ordrar</td></tr>'}</tbody></table>
    </div>`;
}

// ── STATISTIK ────────────────────────────────────────────────
async function renderStatistikPage() {
  const { data: all } = await SB.from('orders').select('*').eq('restaurant_id', REST.id).eq('status', 'delivered');
  const orders = all || [];
  const today = new Date().toDateString();
  const todayOrd = orders.filter(o => new Date(o.created_at).toDateString() === today);
  const totalRev = orders.reduce((s, o) => s + (o.total_amount||o.total||0), 0);
  const todayRev = todayOrd.reduce((s, o) => s + (o.total_amount||o.total||0), 0);
  const itemCount = {};
  orders.forEach(o => { const items = (() => { try { return Array.isArray(o.items) ? o.items : JSON.parse(o.items || '[]'); } catch(e) { return []; } })(); items.forEach(i => { itemCount[i.name] = (itemCount[i.name]||0) + (i.qty||i.quantity||1); }); });
  const top = Object.entries(itemCount).sort((a,b) => b[1]-a[1]).slice(0,5);
  document.getElementById('mainContent').innerHTML = `
    <div class="page-title">Statistik</div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Idag</div><div class="stat-val" style="color:var(--cyan)">${todayOrd.length}</div><div style="font-size:11px;color:var(--text2)">ordrar</div></div>
      <div class="stat-card"><div class="stat-label">Idag intäkter</div><div class="stat-val" style="color:var(--green)">${todayRev} kr</div></div>
      <div class="stat-card"><div class="stat-label">Totala ordrar</div><div class="stat-val">${orders.length}</div></div>
      <div class="stat-card"><div class="stat-label">Total omsättning</div><div class="stat-val" style="color:var(--orange)">${totalRev} kr</div></div>
    </div>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:11px;padding:20px">
      <div class="profil-sec-title">Top Rätter</div>
      ${top.map(([name, count]) => `<div style="display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)"><span>${name}</span><span style="color:var(--cyan);font-family:var(--mono)">${count} beställda</span></div>`).join('') || '<div style="color:var(--text3)">Ingen data ännu</div>'}
    </div>`;
}

// ── PROFIL ───────────────────────────────────────────────────
function renderProfilPage() {
  const r = REST;
  document.getElementById('mainContent').innerHTML = `
    <div class="page-title">Restaurangprofil</div>
    <div class="profil-grid">
      <div class="profil-sec">
        <div class="profil-sec-title">Kontaktuppgifter</div>
        <div class="p-group"><label class="p-label">Namn</label><input class="p-input" id="pNamn" value="${r.name||''}"></div>
        <div class="p-group"><label class="p-label">E-post</label><input class="p-input" id="pEmail" value="${r.email||''}"></div>
        <div class="p-group"><label class="p-label">Telefon</label><input class="p-input" id="pTel" value="${r.phone||''}"></div>
      </div>
      <div class="profil-sec">
        <div class="profil-sec-title">Adress</div>
        <div class="p-group"><label class="p-label">Gatuadress</label><input class="p-input" id="pAdress" value="${r.address||''}"></div>
        <div class="p-group"><label class="p-label">Postnummer</label><input class="p-input" id="pZip" value="${r.zip||''}"></div>
        <div class="p-group"><label class="p-label">Stad</label><input class="p-input" id="pStad" value="${r.city||'Nyköping'}"></div>
      </div>
      <div class="profil-sec full">
        <div class="profil-sec-title">Övrigt</div>
        <div class="p-group"><label class="p-label">Öppettider</label><input class="p-input" id="pTimmar" value="${r.opening_hours||'11:00–22:00'}"></div>
        <div class="p-group"><label class="p-label">Kökstyp</label><input class="p-input" id="pKok" value="${r.cuisine||r.category||''}"></div>
        <button class="btn-save" onclick="saveProfil()">Spara ändringar</button>
      </div>
    </div>`;
}

async function saveProfil() {
  const payload = { name: document.getElementById('pNamn')?.value, email: document.getElementById('pEmail')?.value,
    phone: document.getElementById('pTel')?.value, address: document.getElementById('pAdress')?.value,
    zip: document.getElementById('pZip')?.value, city: document.getElementById('pStad')?.value,
    opening_hours: document.getElementById('pTimmar')?.value, cuisine: document.getElementById('pKok')?.value };
  const { error } = await SB.from('restaurants').update(payload).eq('id', REST.id);
  if (error) { toast('❌ ' + error.message); return; }
  Object.assign(REST, payload);
  document.getElementById('sbName').innerHTML = REST.name + '<span class="dot">.</span>';
  toast('✅ Profil sparad');
}

// ── CHAT ─────────────────────────────────────────────────────
function openChat(orderId) {
  chatOrderId = orderId; chatCh = 'customer';
  document.getElementById('chatOrdId').textContent = (orderId||'').slice(0,12);
  document.getElementById('chatDrawer').classList.add('open');
  document.querySelectorAll('.ch-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('cht-customer').classList.add('active');
  loadChatMsgs();
  if (chatSub) SB.removeChannel(chatSub);
  chatSub = SB.channel('chat-rest-' + orderId)
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chats', filter: `order_id=eq.${orderId}` }, () => loadChatMsgs())
    .subscribe();
}
function closeChat() { document.getElementById('chatDrawer').classList.remove('open'); if (chatSub) SB.removeChannel(chatSub); }
function switchCh(ch) {
  chatCh = ch;
  document.querySelectorAll('.ch-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('cht-' + ch).classList.add('active');
  loadChatMsgs();
}
async function loadChatMsgs() {
  const { data } = await SB.from('chats').select('*').eq('order_id', chatOrderId).eq('channel', chatCh).order('created_at');
  const el = document.getElementById('chatMsgs');
  el.innerHTML = (data||[]).map(m => `<div class="chat-msg ${m.sender_role==='restaurant'?'me':'other'}">
    <div class="msg-sender">${m.sender_name||m.sender_role}</div>${m.message}
    <div class="msg-time">${new Date(m.created_at).toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'})}</div>
  </div>`).join('') || '<div style="text-align:center;color:var(--text3);padding:20px;font-size:12px">Inga meddelanden</div>';
  el.scrollTop = el.scrollHeight;
}
async function sendMsg() {
  const inp = document.getElementById('chatInp');
  const msg = inp.value.trim(); if (!msg) return; inp.value = '';
  await SB.from('chats').insert({ order_id: chatOrderId, sender_role: 'restaurant', sender_name: REST.name, message: msg, channel: chatCh });
}

// ── UTILS ────────────────────────────────────────────────────
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); editingItemId = null; }
function toast(msg) {
  const el = document.createElement('div'); el.className = 'toast'; el.textContent = msg;
  document.body.appendChild(el); setTimeout(() => el.remove(), 3000);
}
document.querySelectorAll('.modal-bg').forEach(bg => bg.addEventListener('click', e => { if (e.target === bg) bg.classList.remove('open'); }));

// ── SESSION CHECK ─────────────────────────────────────────────
SB.auth.getSession().then(async ({ data: { session } }) => {
  if (!session) return;
  const uid = session.user.id; const email = session.user.email;
  let rest = null;
  try { const { data: r } = await SB.from('restaurants').select('*').eq('auth_user_id', uid).maybeSingle(); if (r) rest = r; } catch(e) {}
  if (!rest) { try { const { data: r } = await SB.from('restaurants').select('*').eq('email', email).maybeSingle(); if (r) rest = r; } catch(e) {} }
  if (!rest) return;
  REST = rest;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appShell').style.display = 'flex';
  document.getElementById('sbName').innerHTML = REST.name + '<span class="dot">.</span>';
  isOpen = REST.is_open || false; updateStatusUI();
  await Promise.all([loadMenu(), loadCats()]);
  subscribeOrders(); renderPage('ordrar');
});
</script>
</body>
</html>
